<!doctype html>
<html lang="zh-HK">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>檔案切割器</title>
<style>
:root{--bg:#0f1115;--card:#1a1e26;--text:#e8e8ea;--muted:#9aa3b2;--accent:#ffb84d;--off:#5a6270;}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,"PingFang TC",sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:880px;margin:0 auto;padding:16px}.title{font-size:28px;font-weight:700;color:var(--accent);margin:6px 0 12px}
.tabs{display:flex;gap:8px;margin-bottom:12px}.tab{border:1px solid #2e3440;background:#161a22;color:var(--text);padding:10px 14px;border-radius:10px;cursor:pointer}
.tab.active{border-color:var(--accent);color:var(--accent)}.panel{display:none}.panel.active{display:block}
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px}.row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0;flex-wrap:wrap}
label{color:var(--text)} input[type=file],input[type=number]{background:#11151c;border:1px solid #37404f;color:#fff;border-radius:8px;padding:8px;width:100%}
input[type=number]{width:140px}.btn{background:var(--accent);border:none;color:#121212;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}
.btn:disabled{opacity:.5;cursor:not-allowed}.progress{height:12px;background:#222a36;border-radius:999px;overflow:hidden}.bar{height:100%;width:0;background:var(--accent)}
.log{height:180px;overflow:auto;background:#0d1016;border:1px solid #2e3440;border-radius:8px;padding:8px;font-size:12px;white-space:pre-wrap}
.toggle{width:52px;height:30px;border-radius:999px;background:var(--off);display:inline-flex;align-items:center;padding:3px;cursor:pointer;vertical-align:middle}
.toggle.on{background:var(--accent)} .knob{width:24px;height:24px;border-radius:50%;background:#fff;transition:margin-left .18s ease}.toggle.on .knob{margin-left:22px}
.small{font-size:12px;color:var(--muted)}
</style>
</head>
<body><div class="container">
<div class="title">檔案切割器</div>
<div class="tabs"><button class="tab active" data-tab="split">切割</button><button class="tab" data-tab="merge">合併</button></div>
<div id="split" class="panel active">
  <div class="card"><div class="row"><label>揀檔案</label><input id="splitFile" type="file"></div>
  <div class="row"><label>每片大小 (MB, 十進制)</label><input id="chunkMb" type="number" min="1" value="25"></div>
  <div class="row"><label>自動開始</label><div id="autoStart" class="toggle"><span class="knob"></span></div></div>
  <div class="row"><label>細檔直接複製（唔切）</label><div id="copySmall" class="toggle on"><span class="knob"></span></div></div>
  <div class="row"><label>計 SHA256</label><div id="hashOn" class="toggle on"><span class="knob"></span></div></div>
  <div class="row"><button id="startSplit" class="btn">開始切割</button><button id="downloadZip" class="btn" disabled>下載 ZIP</button></div>
  <div class="progress"><div id="splitBar" class="bar"></div></div><div id="splitInfo" class="small"></div>
  </div><div class="card"><div id="splitLog" class="log"></div></div>
</div>
<div id="merge" class="panel">
  <div class="card"><div class="row"><label>揀 ZIP（建議）</label><input id="mergeZip" type="file" accept=".zip,application/zip"></div>
  <div class="row"><label>或者揀 manifest + parts</label><input id="mergeFiles" type="file" multiple></div>
  <div class="row"><button id="startMerge" class="btn">開始合併</button><button id="downloadMerged" class="btn" disabled>下載還原檔案</button></div>
  <div class="progress"><div id="mergeBar" class="bar"></div></div><div id="mergeInfo" class="small"></div></div>
  <div class="card"><div id="mergeLog" class="log"></div></div>
</div></div>
<script>
const MB=1000000;let splitZipBlob=null,mergedBlob=null,mergedName='restored.bin';
const $=id=>document.getElementById(id);const enc=new TextEncoder(),dec=new TextDecoder();
function log(el,m){el.textContent+=`[${new Date().toLocaleTimeString()}] ${m}\n`;el.scrollTop=el.scrollHeight}
function setToggle(el,on){el.classList.toggle('on',on);el.dataset.on=on?'1':'0'} function isOn(el){return el.dataset.on==='1'}
['autoStart','copySmall','hashOn'].forEach((id,i)=>{const el=$(id);setToggle(el,i!==0);el.onclick=()=>setToggle(el,!isOn(el));});
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');$(b.dataset.tab).classList.add('active');});
class SHA256{constructor(){this.h=[1779033703,3144134277,1013904242,2773480762,1359893119,2600822924,528734635,1541459225];this.buf=new Uint8Array(64);this.idx=0;this.len=0n;}static K=[1116352408,1899447441,3049323471,3921009573,961987163,1508970993,2453635748,2870763221,3624381080,310598401,607225278,1426881987,1925078388,2162078206,2614888103,3248222580,3835390401,4022224774,264347078,604807628,770255983,1249150122,1555081692,1996064986,2554220882,2821834349,2952996808,3210313671,3336571891,3584528711,113926993,338241895,666307205,773529912,1294757372,1396182291,1695183700,1986661051,2177026350,2456956037,2730485921,2820302411,3259730800,3345764771,3516065817,3600352804,4094571909,275423344,430227734,506948616,659060556,883997877,958139571,1322822218,1537002063,1747873779,1955562222,2024104815,2227730452,2361852424,2428436474,2756734187,3204031479,3329325298];
_r(n,x){return(x>>>n)|(x<<(32-n))}_c(){const w=new Uint32Array(64);for(let i=0;i<16;i++){const j=i*4;w[i]=(this.buf[j]<<24)|(this.buf[j+1]<<16)|(this.buf[j+2]<<8)|this.buf[j+3]}for(let i=16;i<64;i++){const s0=this._r(7,w[i-15])^this._r(18,w[i-15])^(w[i-15]>>>3),s1=this._r(17,w[i-2])^this._r(19,w[i-2])^(w[i-2]>>>10);w[i]=(w[i-16]+s0+w[i-7]+s1)>>>0}let[a,b,c,d,e,f,g,h]=this.h;for(let i=0;i<64;i++){const S1=this._r(6,e)^this._r(11,e)^this._r(25,e),ch=(e&f)^(~e&g),t1=(h+S1+ch+SHA256.K[i]+w[i])>>>0,S0=this._r(2,a)^this._r(13,a)^this._r(22,a),maj=(a&b)^(a&c)^(b&c),t2=(S0+maj)>>>0;h=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b;b=a;a=(t1+t2)>>>0}this.h=[(this.h[0]+a)>>>0,(this.h[1]+b)>>>0,(this.h[2]+c)>>>0,(this.h[3]+d)>>>0,(this.h[4]+e)>>>0,(this.h[5]+f)>>>0,(this.h[6]+g)>>>0,(this.h[7]+h)>>>0];}
update(u8){for(const b of u8){this.buf[this.idx++]=b;this.len+=8n;if(this.idx===64){this._c();this.idx=0}}}hex(){this.buf[this.idx++]=0x80;if(this.idx>56){while(this.idx<64)this.buf[this.idx++]=0;this._c();this.idx=0}while(this.idx<56)this.buf[this.idx++]=0;let L=this.len;for(let i=63;i>=56;i--){this.buf[i]=Number(L&255n);L>>=8n}this._c();return this.h.map(x=>x.toString(16).padStart(8,'0')).join('')}}
function u16(n){const b=new Uint8Array(2);new DataView(b.buffer).setUint16(0,n,true);return b} function u32(n){const b=new Uint8Array(4);new DataView(b.buffer).setUint32(0,n,true);return b}
function u64(n){let x=BigInt(n),b=new Uint8Array(8);for(let i=0;i<8;i++){b[i]=Number(x&255n);x>>=8n}return b}
async function buildZipStore(entries){let parts=[],cd=[],off=0n;for(const e of entries){const name=enc.encode(e.name),zip64=(e.size>0xffffffff||off>0xffffffffn);let extra=new Uint8Array(0),csize=e.size,usize=e.size,ofs=Number(off);
if(zip64){const ex=[...u16(0x0001),...u16(24),...u64(e.size),...u64(e.size),...u64(off)];extra=new Uint8Array(ex);csize=0xffffffff;usize=0xffffffff;ofs=0xffffffff}
const lh=new Uint8Array(30+name.length+extra.length);const v=new DataView(lh.buffer);v.setUint32(0,0x04034b50,true);v.setUint16(4,zip64?45:20,true);v.setUint16(6,0x0800,true);v.setUint16(8,0,true);v.setUint32(14,e.crc>>>0,true);v.setUint32(18,csize,true);v.setUint32(22,usize,true);v.setUint16(26,name.length,true);v.setUint16(28,extra.length,true);lh.set(name,30);lh.set(extra,30+name.length);
parts.push(lh,e.blob);off+=BigInt(lh.length)+BigInt(e.size);
const ch=new Uint8Array(46+name.length+extra.length);const c=new DataView(ch.buffer);c.setUint32(0,0x02014b50,true);c.setUint16(4,45,true);c.setUint16(6,zip64?45:20,true);c.setUint16(8,0x0800,true);c.setUint16(10,0,true);c.setUint32(16,e.crc>>>0,true);c.setUint32(20,csize,true);c.setUint32(24,usize,true);c.setUint16(28,name.length,true);c.setUint16(30,extra.length,true);c.setUint32(42,ofs,true);ch.set(name,46);ch.set(extra,46+name.length);cd.push(ch)}
const cdBlob=new Blob(cd);const cdSize=BigInt(cdBlob.size),cdOff=off;parts.push(cdBlob);
const need64=(cdOff>0xffffffffn||cdSize>0xffffffffn||entries.length>65535);
if(need64){const z64=new Uint8Array(56);let d=new DataView(z64.buffer);d.setUint32(0,0x06064b50,true);d.setBigUint64(4,44n,true);d.setUint16(12,45,true);d.setUint16(14,45,true);d.setBigUint64(24,BigInt(entries.length),true);d.setBigUint64(32,BigInt(entries.length),true);d.setBigUint64(40,cdSize,true);d.setBigUint64(48,cdOff,true);parts.push(z64);const loc=new Uint8Array(20);d=new DataView(loc.buffer);d.setUint32(0,0x07064b50,true);d.setUint32(8,Number(cdOff+cdSize),true);d.setUint32(16,1,true);parts.push(loc)}
const eocd=new Uint8Array(22);const e=new DataView(eocd.buffer);e.setUint32(0,0x06054b50,true);e.setUint16(8,Math.min(entries.length,65535),true);e.setUint16(10,Math.min(entries.length,65535),true);e.setUint32(12,Number(need64?0xffffffff:cdSize),true);e.setUint32(16,Number(need64?0xffffffff:cdOff),true);parts.push(eocd);return new Blob(parts,{type:'application/zip'})}
async function split(){const f=$('splitFile').files[0];if(!f)return;const logEl=$('splitLog');logEl.textContent='';const chunk=Math.max(1,Number($('chunkMb').value)||25)*MB;log(logEl,`開始：${f.name} (${f.size} bytes), chunk=${chunk}`);
const copySmall=isOn($('copySmall')),hashing=isOn($('hashOn'));let entries=[],manifest={version:1,name:f.name,type:f.type||'application/octet-stream',size:f.size,chunkSize:chunk,parts:[],sha256:null};
let pos=0,idx=0,sha=hashing?new SHA256():null;while(pos<f.size|| (f.size===0&&idx===0)){let end=Math.min(f.size,pos+chunk),blob;
if(f.size===0){blob=new Blob([])} else if(copySmall&&f.size<=chunk){blob=f.slice(0,f.size);end=f.size;} else blob=f.slice(pos,end);
const ab=await blob.arrayBuffer();const u8=new Uint8Array(ab);if(sha)sha.update(u8);const p=`${f.name}.part${String(idx).padStart(3,'0')}`;manifest.parts.push({name:p,size:u8.length,index:idx});entries.push({name:p,blob:new Blob([u8]),size:u8.length,crc:0}); // crc set 0 for STORE permissive
pos=end;idx++;$('splitBar').style.width=`${f.size?Math.floor(pos/f.size*100):100}%`;if(copySmall&&f.size<=chunk)break; if(pos>=f.size)break; await new Promise(r=>setTimeout(r,0));}
manifest.sha256=sha?sha.hex():null;entries.unshift({name:'manifest.json',blob:new Blob([JSON.stringify(manifest,null,2)],{type:'application/json'}),size:(new Blob([JSON.stringify(manifest,null,2)])).size,crc:0});
splitZipBlob=await buildZipStore(entries);$('downloadZip').disabled=false;$('splitInfo').textContent=`完成：${manifest.parts.length} 片，ZIP ${splitZipBlob.size} bytes`;log(logEl,'完成切割');}
async function downloadBlob(blob,name){const file=new File([blob],name);if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title:name});return}catch(e){}}
const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),5000);try{window.open(url,'_blank')}catch(e){}
}
$('startSplit').onclick=split;$('splitFile').onchange=()=>{if(isOn($('autoStart')))split()};$('downloadZip').onclick=()=>splitZipBlob&&downloadBlob(splitZipBlob,'split_parts.zip');
async function parseZip(file){const tail=await file.slice(Math.max(0,file.size-131072),file.size).arrayBuffer();const t=new Uint8Array(tail);let eocd=-1;for(let i=t.length-22;i>=0;i--)if(t[i]===0x50&&t[i+1]===0x4b&&t[i+2]===0x05&&t[i+3]===0x06){eocd=i;break} if(eocd<0)throw Error('搵唔到 ZIP EOCD');
const dv=new DataView(t.buffer);let cdSize=dv.getUint32(eocd+12,true),cdOff=dv.getUint32(eocd+16,true);if(cdSize===0xffffffff||cdOff===0xffffffff){let loc=-1;for(let i=eocd-20;i>=0;i--)if(t[i]===0x50&&t[i+1]===0x4b&&t[i+2]===0x06&&t[i+3]===0x07){loc=i;break}if(loc<0)throw Error('搵唔到 ZIP64 locator');const z64off=Number(new DataView(t.buffer).getBigUint64(loc+8,true));const z64=await file.slice(z64off,z64off+56).arrayBuffer();const z=new DataView(z64);cdSize=Number(z.getBigUint64(40,true));cdOff=Number(z.getBigUint64(48,true));}
const cdBuf=await file.slice(cdOff,cdOff+cdSize).arrayBuffer();const cd=new DataView(cdBuf);let p=0,ents=[];while(p<cdSize&&cd.getUint32(p,true)===0x02014b50){const comp=cd.getUint16(p+10,true),csize=cd.getUint32(p+20,true),nlen=cd.getUint16(p+28,true),xlen=cd.getUint16(p+30,true),off=cd.getUint32(p+42,true);const name=dec.decode(new Uint8Array(cdBuf,p+46,nlen));let dataOff=off,usize=cd.getUint32(p+24,true),cc=csize;
if(comp!==0)throw Error('只支援 STORE zip'); if(cc===0xffffffff||usize===0xffffffff||off===0xffffffff){const ex=new DataView(cdBuf,p+46+nlen,xlen);let q=0;while(q<xlen){const id=ex.getUint16(q,true),sz=ex.getUint16(q+2,true);if(id===1){let z=q+4;if(usize===0xffffffff){usize=Number(ex.getBigUint64(z,true));z+=8}if(cc===0xffffffff){cc=Number(ex.getBigUint64(z,true));z+=8}if(off===0xffffffff){dataOff=Number(ex.getBigUint64(z,true));}}q+=4+sz}}
const lh=await file.slice(dataOff,dataOff+30).arrayBuffer();const lv=new DataView(lh);const ln=lv.getUint16(26,true),lx=lv.getUint16(28,true);const dataStart=dataOff+30+ln+lx;ents.push({name,size:usize,csize:cc,dataStart});p+=46+nlen+xlen+cd.getUint16(p+32,true)+cd.getUint16(p+34,true)+cd.getUint16(p+36,true);}return ents}
async function merge(){const logEl=$('mergeLog');logEl.textContent='';let manifest,partMap=new Map();const zip=$('mergeZip').files[0];
if(zip){const ents=await parseZip(zip);for(const e of ents){if(e.name==='manifest.json'){manifest=JSON.parse(dec.decode(new Uint8Array(await zip.slice(e.dataStart,e.dataStart+e.size).arrayBuffer())))} else partMap.set(e.name,zip.slice(e.dataStart,e.dataStart+e.size));}}
else{const fs=[...$('mergeFiles').files];const mf=fs.find(f=>f.name==='manifest.json');if(!mf)throw Error('冇 manifest.json');manifest=JSON.parse(await mf.text());fs.forEach(f=>{if(f.name!=='manifest.json')partMap.set(f.name,f);});}
if(!manifest)throw Error('讀唔到 manifest');let sha=manifest.sha256?new SHA256():null,chunks=[];for(let i=0;i<manifest.parts.length;i++){const p=manifest.parts[i],b=partMap.get(p.name);if(!b)throw Error('缺少 part: '+p.name);const u8=new Uint8Array(await b.arrayBuffer());chunks.push(u8);if(sha)sha.update(u8);$('mergeBar').style.width=`${Math.floor((i+1)/manifest.parts.length*100)}%`; await new Promise(r=>setTimeout(r,0));}
if(sha&&sha.hex()!==manifest.sha256)throw Error('SHA256 唔一致，檔案可能損壞'); mergedBlob=new Blob(chunks,{type:manifest.type||'application/octet-stream'});mergedName=manifest.name||'restored.bin';$('downloadMerged').disabled=false;$('mergeInfo').textContent=`完成：${mergedName} (${mergedBlob.size} bytes)`;log(logEl,'合併完成，完整性 OK');}
$('startMerge').onclick=()=>merge().catch(e=>log($('mergeLog'),'錯誤：'+e.message));$('downloadMerged').onclick=()=>mergedBlob&&downloadBlob(mergedBlob,mergedName);
</script></body></html>
