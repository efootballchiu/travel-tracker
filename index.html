function parseTripIdFromHash() {
  const h = window.location.hash.replace(/^#/, '').trim();
  if (!h) return TRIP_ID_FALLBACK;
  const m = h.match(/^\/?trip\/([a-zA-Z0-9_-]{1,50})$/);
  return m?.[1] || TRIP_ID_FALLBACK;
}

function setTripHash(tripId) {
  const safe = (tripId || TRIP_ID_FALLBACK).replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 50) || TRIP_ID_FALLBACK;
  window.location.hash = `/trip/${safe}`;
}

function identityStorageKey(tripId) {
  return `${IDENTITY_STORAGE_PREFIX}${tripId}`;
}

function toTzDateString(date, timeZone) {
  try {
    return new Intl.DateTimeFormat('en-CA', { timeZone, year: 'numeric', month: '2-digit', day: '2-digit' }).format(date);
  } catch (e) {
    return date.toISOString().split('T')[0];
  }
}

// ========== 匯率 ==========
async function fetchExchangeRate(from, to) {
  if (!from || !to) return null;
  if (from === to) return { rate: 1, timestamp: Date.now() };
  try {
    const res = await fetch(`https://open.er-api.com/v6/latest/${from}`);
    const data = await res.json();
    if (data.result === 'success' && data.rates && data.rates[to]) {
      return { rate: data.rates[to], timestamp: data.time_last_update_unix * 1000 };
    }
  } catch (e) {}
  try {
    const res = await fetch(`https://latest.currency-api.pages.dev/v1/currencies/${from.toLowerCase()}.json`);
    const data = await res.json();
    const rate = data?.[from.toLowerCase()]?.[to.toLowerCase()];
    if (rate) {
      return { rate, timestamp: data?.date ? new Date(`${data.date}T00:00:00Z`).getTime() : Date.now() };
    }
  } catch (e) {}
  try {
    const res = await fetch(`https://api.frankfurter.dev/v1/latest?base=${from}&symbols=${to}`);
    const data = await res.json();
    if (data?.rates?.[to]) {
      return { rate: data.rates[to], timestamp: data?.date ? new Date(`${data.date}T00:00:00Z`).getTime() : Date.now() };
    }
  } catch (e) {}
  return null;
}

function getCurrencySymbol(code) { return CURRENCIES.find(c => c.code === code)?.symbol || code; }
function formatMoney(amount, code, short = false) {
  const sym = getCurrencySymbol(code);
  if (short && Math.abs(amount) >= 10000) return sym + (amount / 1000).toFixed(1) + 'k';
  return sym + Math.round(amount).toLocaleString();
}
function convert(amount, rate) { return (!rate || !rate.rate) ? 0 : amount * rate.rate; }

function getExpenseShares(expense, memberIds = []) {
  const amount = Number(expense?.amount || 0);
  if (amount <= 0) return {};
  const splitAmong = Array.isArray(expense?.splitAmong) ? expense.splitAmong.filter(Boolean) : [];
  const targets = splitAmong.length ? splitAmong : memberIds;
  if (!targets.length) return {};

  if (expense?.splitMode === 'manual' && expense?.manualSplit && typeof expense.manualSplit === 'object') {
    const shares = {};
    let manualTotal = 0;
    targets.forEach((id) => {
      const v = Number(expense.manualSplit[id] || 0);
      if (v > 0) {
        shares[id] = v;
        manualTotal += v;
      }
    });
    if (manualTotal > 0) {
      const ratio = amount / manualTotal;
      Object.keys(shares).forEach((id) => { shares[id] = shares[id] * ratio; });
      return shares;
    }
  }

  const per = amount / targets.length;
  const shares = {};
  targets.forEach((id) => { shares[id] = per; });
  return shares;
}

function calculateBalances(expenses, members) {
  const balances = {};
  members.forEach(m => balances[m.id] = 0);
  expenses.forEach(exp => {
    if (exp.transactionType === 'personal') return;
    if (!exp.paidBy) return;
    const shares = getExpenseShares(exp, members.map(m => m.id));
    const shareIds = Object.keys(shares);
    if (!shareIds.length) return;
    balances[exp.paidBy] = (balances[exp.paidBy] || 0) + exp.amount;
    shareIds.forEach(mid => { balances[mid] = (balances[mid] || 0) - (shares[mid] || 0); });
  });
  return balances;
}

function simplifyTransfers(balances) {
  const creditors = [], debtors = [];
  Object.entries(balances).forEach(([id, bal]) => {
    if (bal > 0.01) creditors.push({ id, amount: bal });
    else if (bal < -0.01) debtors.push({ id, amount: -bal });
  });
  creditors.sort((a, b) => b.amount - a.amount);
  debtors.sort((a, b) => b.amount - a.amount);
  const transfers = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const amt = Math.min(debtors[i].amount, creditors[j].amount);
    if (amt > 0.01) transfers.push({ from: debtors[i].id, to: creditors[j].id, amount: amt });
    debtors[i].amount -= amt;
    creditors[j].amount -= amt;
    if (debtors[i].amount < 0.01) i++;
    if (creditors[j].amount < 0.01) j++;
  }
  return transfers;
}

      setComments(list);

    return () => { u0(); u1(); u2(); u3(); u4(); u5(); };

    if (!canEditActiveTrip) return alert(isTripArchived ? '旅程已封存，目前只可檢視' : '你目前是 Viewer，無法新增/修改消費');
    const { db, doc, setDoc, collection, getDoc } = window.__firebase;

      try {
        const existing = await getDoc(doc(expensesRef, id));
        if (existing.exists()) {
          const serverUpdatedAt = existing.data()?.updatedAt || 0;
          if ((expense.updatedAt || 0) < serverUpdatedAt) {
            alert('檢測到衝突：此記錄已被其他人更新，請重新打開後再儲存。');
            return;
          }
        }
      } catch (e) {}
    }
    const data = {
      splitMode: 'equal',
      manualSplit: {},
      transactionType: 'shared',
      splitTarget: 'all',
      note: '',
      expenseDateTime: expense.date ? `${expense.date}T12:00` : new Date().toISOString().slice(0, 16),
      ...expense,
      createdAt: expense.createdAt || Date.now(),
      updatedAt: Date.now(),
      createdBy: expense.createdBy || currentUserId || '',
      updatedBy: currentUserId || expense.updatedBy || '',
    };
    delete data.id;
    try {
      await setDoc(doc(expensesRef, id), data);
      await addActivity(expense.id ? 'expense.update' : 'expense.create', `${expense.id ? '修改' : '新增'}消費：${data.name}`, { expenseId: id, amount: data.amount });
    } catch (e) { alert('儲存失敗：' + e.message); }
  };
  const deleteExpense = async (id) => {
    if (!canEditActiveTrip) return alert(isTripArchived ? '旅程已封存，目前只可檢視' : '你目前是 Viewer，無法刪除');
    const { db, doc, setDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', tripId, 'expenses');
    try {
      await setDoc(doc(expensesRef, id), { deletedAt: Date.now(), deletedBy: currentUserId || '', updatedAt: Date.now(), updatedBy: currentUserId || '' }, { merge: true });
      await addActivity('expense.soft_delete', '刪除咗一筆消費', { expenseId: id });
    } catch (e) {}
  };
  const restoreExpense = async (id) => {
    if (!canEditActiveTrip) return alert(isTripArchived ? '旅程已封存，目前只可檢視' : '你目前是 Viewer，無法還原');
    const { db, doc, setDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', tripId, 'expenses');
    try {
      await setDoc(doc(expensesRef, id), { deletedAt: null, deletedBy: null, updatedAt: Date.now(), updatedBy: currentUserId || '' }, { merge: true });
      await addActivity('expense.restore', '還原咗一筆消費', { expenseId: id });
    } catch (e) {}
  };
  const addMultipleExpenses = async (items) => {
    if (!canEditActiveTrip) return alert(isTripArchived ? '旅程已封存，目前只可檢視' : '你目前是 Viewer，無法新增');
    const { db, doc, setDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', tripId, 'expenses');
    try {
      await Promise.all(items.map(item => {
        const id = Date.now().toString() + Math.random().toString(36).slice(2, 6);
        const { id: _, ...data } = item;
        return setDoc(doc(expensesRef, id), {
          splitMode: 'equal', manualSplit: {}, transactionType: 'shared', splitTarget: 'all', note: '',
          ...data, createdAt: Date.now(), updatedAt: Date.now(), createdBy: currentUserId || '', updatedBy: currentUserId || ''
        });
      }));
      await addActivity('expense.batch_create', `批次新增 ${items.length} 筆消費`);
    } catch (e) { alert('儲存失敗：' + e.message); }
  };
  const upsertMember = async (member) => {
    if (!canManageMembers) return alert('只有 Admin 可以管理旅伴');
    const { db, doc, setDoc, collection } = window.__firebase;
    const membersRef = collection(db, 'trips', tripId, 'members');
    const id = member.id || (Date.now().toString() + Math.random().toString(36).slice(2, 6));
    const hasAdmin = members.some(m => m.role === 'admin');
    const data = { role: (!hasAdmin && !member.id) ? 'admin' : 'editor', ...member, createdAt: member.createdAt || Date.now(), updatedAt: Date.now() };
    delete data.id;
    try {
      await setDoc(doc(membersRef, id), data);
      await addActivity(member.id ? 'member.update' : 'member.create', `${member.id ? '更新' : '新增'}旅伴：${data.name}`, { memberTargetId: id, role: data.role });
    } catch (e) { alert(e.message); }
  };
  const deleteMember = async (id) => {
    if (!canManageMembers) return alert('只有 Admin 可以管理旅伴');
    const { db, doc, deleteDoc, collection } = window.__firebase;
    const membersRef = collection(db, 'trips', tripId, 'members');
    try { await deleteDoc(doc(membersRef, id)); await addActivity('member.delete', '刪除旅伴', { memberTargetId: id }); } catch (e) {}
  };
  const saveSettings = async (next) => {
    if (!canManageTrip) return alert('只有 Admin 可以修改旅程設定');
    const { db, doc, setDoc } = window.__firebase;
    const ref = doc(db, 'trips', tripId, 'meta', 'settings');
    const tripRef = doc(db, 'trips', tripId);
    try {
      await setDoc(ref, { ...next, updatedAt: Date.now() });
      await setDoc(tripRef, { tripName: next.tripName || tripId, archived: !!next.archived, updatedAt: Date.now(), settlementTimezone: next.settlementTimezone || 'Asia/Tokyo' }, { merge: true });
      await addActivity('trip.settings', '更新旅程設定');
    } catch (e) {}
  };

  const currentUser = members.find(m => m.id === currentUserId) || null;
  const currentRole = currentUser?.role || '';
  const canBootstrap = members.length === 0;
  const canEditExpense = canBootstrap || currentRole === 'admin' || currentRole === 'editor';
  const canManageMembers = canBootstrap || currentRole === 'admin';
  const canManageTrip = canBootstrap || currentRole === 'admin';
  const isTripArchived = !!settings.archived;
  const canEditActiveTrip = canEditExpense && !isTripArchived;

  useEffect(() => {
    if (!fbReady || loading) return;
    const run = async () => {
      const { db, doc, setDoc, getDoc } = window.__firebase;
      const tz = settings.settlementTimezone || 'Asia/Tokyo';
      const todayKey = toTzDateString(new Date(), tz);
      const settingsRef = doc(db, 'trips', tripId, 'meta', 'settings');
      const sSnap = await getDoc(settingsRef);
      const lastSnapDate = sSnap.exists() ? sSnap.data()?.lastSnapshotDate : null;
      let cursor = lastSnapDate ? new Date(`${lastSnapDate}T00:00:00`) : new Date(new Date(settings.startDate || todayKey).toISOString().split('T')[0] + 'T00:00:00');
      const end = new Date(`${todayKey}T00:00:00`);
      let loops = 0;
      while (cursor <= end && loops < 400) {
        const key = cursor.toISOString().split('T')[0];
        const snapRef = doc(db, 'trips', tripId, 'snapshots', key);
        const exists = await getDoc(snapRef);
        if (!exists.exists()) {
          const cutoff = new Date(`${key}T23:59:59.999`);
          const cutoffTs = cutoff.getTime();
          const eligible = expenses.filter(e => !e.deletedAt && (e.createdAt || 0) <= cutoffTs);
          const total = eligible.reduce((s, e) => s + Number(e.amount || 0), 0);
          await setDoc(snapRef, {
            date: key,
            timezone: tz,
            expenseCount: eligible.length,
            totalAmount: total,
            createdAt: Date.now(),
            immutable: true,
          });
        }
        cursor.setDate(cursor.getDate() + 1);
        loops++;
      }
      await setDoc(settingsRef, { ...settings, lastSnapshotDate: todayKey, updatedAt: Date.now() }, { merge: true });
    };
    run();
  }, [fbReady, loading, tripId, settings.startDate, settings.settlementTimezone, expenses.length]);

  const addActivity = async (action, detail, extra = {}) => {
    const { db, doc, setDoc, collection } = window.__firebase;
    const logsRef = collection(db, 'trips', tripId, 'activityLogs');
    const id = `${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
    await setDoc(doc(logsRef, id), {
      action,
      detail,
      createdAt: Date.now(),
      memberId: currentUserId || '',
      memberName: currentUser?.name || 'Unknown',
      color: currentUser?.color || '#FF8C00',
      ...extra,
    });
  };

  const addComment = async (text) => {
    const content = (text || '').trim();
    if (!content) return;
    if (isTripArchived) return alert('旅程已封存，目前只可檢視');
    const { db, doc, setDoc, collection } = window.__firebase;
    const commentsRef = collection(db, 'trips', tripId, 'comments');
    const id = `${Date.now()}_${Math.random().toString(36).slice(2, 6)}`;
    await setDoc(doc(commentsRef, id), {
      text: content,
      createdAt: Date.now(),
      memberId: currentUserId || '',
      memberName: currentUser?.name || 'Unknown',
      color: currentUser?.color || '#FF8C00',
    });
    await addActivity('comment.create', '新增留言');
  };

  const selectIdentity = async (memberId) => {
    const { db, doc, setDoc, collection } = window.__firebase;
    const picked = members.find(m => m.id === memberId);
    if (!picked) return;
    const hasAdmin = members.some(m => m.role === 'admin');
    if (!hasAdmin) {
      const membersRef = collection(db, 'trips', tripId, 'members');
      await setDoc(doc(membersRef, memberId), { ...picked, role: 'admin', updatedAt: Date.now() }, { merge: true });
    }
    localStorage.setItem(identityStorageKey(tripId), memberId);
    setCurrentUserId(memberId);
  };

  const createTrip = async () => {
    const name = prompt('新旅程名稱（例如：2026-東京）');
    if (!name) return;
    const id = name.toLowerCase().replace(/[^a-z0-9_-]/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '') || `${Date.now()}`;
    const { db, doc, setDoc, collection } = window.__firebase;
    await setDoc(doc(db, 'trips', id), { tripName: name, archived: false, updatedAt: Date.now() }, { merge: true });
    await setDoc(doc(db, 'trips', id, 'meta', 'settings'), { ...DEFAULT_SETTINGS, tripName: name, updatedAt: Date.now() }, { merge: true });
    const memberRef = collection(db, 'trips', id, 'members');
    if (currentUser) {
      await setDoc(doc(memberRef, currentUser.id), { ...currentUser, role: 'admin', createdAt: Date.now(), updatedAt: Date.now() }, { merge: true });
    }
    setTripHash(id);
  };

  if (!fbReady || loading) {
    return (
      <div className="h-screen w-full flex items-center justify-center bg-black">
        <div className="flex flex-col items-center gap-3">
          <IconLoader className="w-8 h-8 animate-spin text-orange-500" />
          <div className="text-zinc-500 text-xs">連接雲端中...</div>
        </div>
      </div>
    );
  }

  const ctx = {
    tripId, trips, currentUser, currentRole, canEditExpense, canManageMembers, canManageTrip, isTripArchived, canEditActiveTrip,
    expenses, members, settings, currentRate, refreshing, online, activityLogs, comments,
    upsertExpense, deleteExpense, restoreExpense, addMultipleExpenses,
    upsertMember, deleteMember, saveSettings, refreshRate, createTrip, setTripHash, addComment,
  };

  return (
    <div className="h-screen w-full bg-black flex flex-col max-w-md mx-auto relative overflow-hidden">
      <div className="flex-1 overflow-y-auto pb-24">
        {tab === 'home' && <HomeTab {...ctx} setTab={setTab} />}
        {tab === 'records' && <RecordsTab {...ctx} />}
        {tab === 'scan' && <ScanTab {...ctx} onDone={() => setTab('records')} />}
        {tab === 'stats' && <StatsTab {...ctx} />}
        {tab === 'settings' && <SettingsTab {...ctx} />}
      </div>
      <BottomNav tab={tab} setTab={setTab} />
      {!!members.length && !currentUser && (
        <IdentityPicker members={members} tripId={tripId} onSelect={selectIdentity} />
      )}
    </div>
  );
}

// ========== BottomNav ==========

  const items = [
    { id: 'home', icon: IconHome, label: '首頁' },
    { id: 'records', icon: IconList, label: '紀錄' },
    { id: 'scan', icon: IconCamera, label: '掃描', center: true },
    { id: 'stats', icon: IconChart, label: '統計' },
    { id: 'settings', icon: IconSettings, label: '設定' },
  ];
  return (
    <div className="absolute bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-900 flex justify-around items-center py-2 safe-bottom z-40">
      {items.map(it => {
        const IconEl = it.icon;
        const active = tab === it.id;
        if (it.center) {
          return (
            <button key={it.id} onClick={() => setTab(it.id)}
              className="relative -mt-6 w-14 h-14 bg-gradient-to-br from-orange-400 to-orange-600 rounded-full flex items-center justify-center shadow-lg shadow-orange-500/30">
              <IconEl className="w-6 h-6 text-white" />
            </button>
          );
        }
        return (
          <button key={it.id} onClick={() => setTab(it.id)} className="flex flex-col items-center gap-0.5 px-3 py-1">
            <IconEl className={`w-5 h-5 ${active ? 'text-orange-500' : 'text-zinc-500'}`} />
            <span className={`text-[10px] ${active ? 'text-orange-500 font-medium' : 'text-zinc-500'}`}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ========== MemberAvatar ==========
function MemberAvatar({ member, size = 40, ring = false }) {
  if (!member) return <div className="rounded-full bg-zinc-800 flex-shrink-0 flex items-center justify-center text-zinc-600" style={{ width: size, height: size }}>👤</div>;
  if (member.avatar) return <img src={member.avatar} alt={member.name} className={`rounded-full object-cover flex-shrink-0 ${ring ? 'ring-2 ring-orange-500' : ''}`} style={{ width: size, height: size }} />;
  const initial = member.name?.[0] || '?';
  return <div className={`rounded-full flex-shrink-0 flex items-center justify-center text-white font-bold ${ring ? 'ring-2 ring-orange-500' : ''}`} style={{ width: size, height: size, backgroundColor: member.color || '#FF8C00', fontSize: size * 0.4 }}>{initial}</div>;
}

// ========== ExpenseCard ==========
function ExpenseCard({ expense, members, settings, currentRate, onClick }) {
  const cat = CATEGORIES.find(c => c.id === expense.category);
  const paidBy = members.find(m => m.id === expense.paidBy);
  const splitMembers = (expense.splitAmong || []).map(id => members.find(m => m.id === id)).filter(Boolean);
  return (
    <button onClick={onClick} disabled={!onClick} className="w-full bg-zinc-950 border border-zinc-900 rounded-2xl p-3 flex items-center gap-3 text-left disabled:opacity-95">
      <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style={{ backgroundColor: cat?.color + '20' }}>{cat?.emoji}</div>
      <div className="flex-1 min-w-0">
        <div className="text-white font-medium truncate text-sm">{expense.name}</div>
        <div className="flex items-center gap-1.5 mt-0.5">
          {paidBy && <><MemberAvatar member={paidBy} size={16} /><span className="text-xs text-zinc-500 truncate">{paidBy.name}</span></>}
          {expense.transactionType === 'personal' && (<><span className="text-xs text-zinc-600">·</span><span className="text-xs text-amber-400">個人</span></>)}
          {splitMembers.length > 0 && splitMembers.length !== members.length && (<><span className="text-xs text-zinc-600">·</span><span className="text-xs text-zinc-500">分 {splitMembers.length} 人</span></>)}
          {expense.location && (<><span className="text-xs text-zinc-600">·</span><span className="text-xs text-zinc-500 truncate">{expense.location}</span></>)}
        </div>
      </div>
      <div className="text-right flex-shrink-0">
        <div className="text-white font-bold">{formatMoney(expense.amount, settings.fromCurrency)}</div>
        <div className="text-[10px] text-zinc-500">{formatMoney(convert(expense.amount, currentRate), settings.toCurrency)}</div>
      </div>
    </button>
  );
}

// ========== HomeTab ==========
function HomeTab({ expenses, settings, members, currentRate, refreshRate, refreshing, online, setTab, isTripArchived }) {
  const today = new Date().toISOString().split('T')[0];
  const activeExpenses = expenses.filter(e => !e.deletedAt);
  const todayExpenses = activeExpenses.filter(e => e.date === today);
  const todayTotal = todayExpenses.reduce((s, e) => s + e.amount, 0);
  const totalAll = activeExpenses.reduce((s, e) => s + e.amount, 0);
  const startDate = new Date(settings.startDate);
  const dayNum = Math.max(1, Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24)) + 1);
  const balances = calculateBalances(activeExpenses, members);
  const transfers = simplifyTransfers(balances);
  const rateTime = currentRate ? new Date(currentRate.timestamp).toLocaleString('zh-HK', { hour: '2-digit', minute: '2-digit' }) : '—';

  return (
    <div className="px-5 safe-top pt-16 pb-4 space-y-5">
      <div className="flex justify-between items-start">
        <div>
          <div className="text-xs text-zinc-500 uppercase tracking-widest mb-1">Trip · Day {dayNum} / {settings.totalDays}</div>
          <h1 className="text-3xl font-bold text-white">{settings.tripName}</h1>
        </div>
        <div className={`flex items-center gap-1 px-2 py-1 rounded-full text-[10px] ${online ? 'bg-green-500/10 text-green-400' : 'bg-zinc-800 text-zinc-500'}`}>
          {online ? <IconWifi className="w-3 h-3" /> : <IconWifiOff className="w-3 h-3" />}
          <span>{online ? '已同步' : '離線'}</span>
        </div>
      </div>

      <div className="bg-gradient-to-br from-orange-500 to-orange-700 rounded-3xl p-5 shadow-lg shadow-orange-500/20">
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2 text-white/80 text-xs"><IconTrend className="w-4 h-4" /> 即時匯率</div>
          <button onClick={refreshRate} disabled={refreshing} className="text-white/80"><IconRefresh className={`w-4 h-4 ${refreshing ? 'animate-spin' : ''}`} /></button>
        </div>
        <div className="text-white">
          <div className="text-sm opacity-90">1 {settings.fromCurrency} =</div>
          <div className="text-3xl font-bold">{currentRate ? currentRate.rate.toFixed(4) : '—'} <span className="text-lg opacity-80">{settings.toCurrency}</span></div>
          <div className="text-xs opacity-70 mt-1">更新於 {rateTime}</div>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-4">
          <div className="flex items-center gap-1.5 text-zinc-500 text-[10px] uppercase tracking-wider mb-2"><IconWallet className="w-3 h-3" />今日支出</div>
          <div className="text-xl font-bold text-white">{formatMoney(todayTotal, settings.fromCurrency, true)}</div>
          <div className="text-xs text-orange-400 mt-1">≈ {formatMoney(convert(todayTotal, currentRate), settings.toCurrency, true)}</div>
        </div>
        <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-4">
          <div className="flex items-center gap-1.5 text-zinc-500 text-[10px] uppercase tracking-wider mb-2"><IconDollar className="w-3 h-3" />旅程累計</div>
          <div className="text-xl font-bold text-white">{formatMoney(totalAll, settings.fromCurrency, true)}</div>
          <div className="text-xs text-orange-400 mt-1">≈ {formatMoney(convert(totalAll, currentRate), settings.toCurrency, true)}</div>
        </div>
      </div>

      {isTripArchived && (
        <div className="bg-amber-500/10 border border-amber-500/30 rounded-2xl p-3 text-amber-200 text-xs">
          此旅程已封存，目前只可檢視；如需新增或修改，請到「設定」取消封存。
        </div>
      )}

      {members.length >= 2 && (
        <div className="bg-zinc-950 border border-zinc-900 rounded-3xl p-5">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-medium text-zinc-400 uppercase tracking-wider">結算</h2>
            <span className="text-xs text-zinc-600">{transfers.length} 筆轉帳</span>
          </div>
          {transfers.length === 0 ? (
            <div className="text-center py-4"><div className="text-2xl mb-1">✨</div><div className="text-zinc-500 text-sm">大家平晒數</div></div>
          ) : (
            <div className="space-y-2">
              {transfers.map((t, idx) => {
                const from = members.find(m => m.id === t.from);
                const to = members.find(m => m.id === t.to);
                return (
                  <div key={idx} className="flex items-center gap-3 py-2">
                    <MemberAvatar member={from} size={36} />
                    <div className="flex-1 min-w-0">
                      <div className="text-white text-sm"><span className="font-medium">{from?.name}</span><span className="text-zinc-500 mx-1.5">→</span><span className="font-medium">{to?.name}</span></div>
                      <div className="text-xs text-orange-400">{formatMoney(t.amount, settings.fromCurrency)}<span className="text-zinc-600 ml-1">≈ {formatMoney(convert(t.amount, currentRate), settings.toCurrency)}</span></div>
                    </div>
                    <MemberAvatar member={to} size={36} />
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      <div>
        <div className="flex justify-between items-baseline mb-3">
          <h2 className="text-sm font-medium text-zinc-400 uppercase tracking-wider">今日花費</h2>
          <button onClick={() => setTab('records')} className="text-xs text-orange-500 flex items-center gap-0.5">全部 <IconChevron className="w-3 h-3" /></button>
        </div>
        {todayExpenses.length === 0 ? (
          <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-8 text-center"><div className="text-3xl mb-2">🌱</div><div className="text-zinc-500 text-sm">今日還沒有消費</div></div>
        ) : (
          <div className="space-y-2">
            {todayExpenses.slice(0, 5).map(e => <ExpenseCard key={e.id} expense={e} members={members} settings={settings} currentRate={currentRate} />)}
          </div>
        )}
      </div>
    </div>
  );
}

// ========== RecordsTab ==========
function RecordsTab({ expenses, upsertExpense, deleteExpense, restoreExpense, members, settings, currentRate, canEditExpense, isTripArchived, canEditActiveTrip }) {
  const [view, setView] = useState('date');
  const [showAdd, setShowAdd] = useState(false);
  const [editExpense, setEditExpense] = useState(null);
  const [showDeleted, setShowDeleted] = useState(false);
  const visibleExpenses = showDeleted ? expenses.filter(e => !!e.deletedAt) : expenses.filter(e => !e.deletedAt);
  const total = visibleExpenses.reduce((s, e) => s + e.amount, 0);

  const grouped = {};
  visibleExpenses.forEach(e => { if (!grouped[e.date]) grouped[e.date] = []; grouped[e.date].push(e); });
  const sortedDates = Object.keys(grouped).sort().reverse();

  const byCategory = {};
  visibleExpenses.forEach(e => { if (!byCategory[e.category]) byCategory[e.category] = { items: [], total: 0 }; byCategory[e.category].items.push(e); byCategory[e.category].total += e.amount; });

  const handleDelete = (id) => { if (confirm('確定刪除？')) deleteExpense(id); };

  return (
    <div className="px-5 safe-top pt-16 pb-4 space-y-4">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-3xl font-bold text-white">所有消費</h1>
          <p className="text-xs text-zinc-500 mt-1">{visibleExpenses.length} 筆 · {formatMoney(total, settings.fromCurrency)} · ≈ {formatMoney(convert(total, currentRate), settings.toCurrency)}</p>
        </div>
        <div className="flex items-center gap-2">
          <button onClick={() => setShowDeleted(s => !s)} className={`px-2.5 py-2 rounded-xl text-xs ${showDeleted ? 'bg-amber-500/20 text-amber-300' : 'bg-zinc-900 text-zinc-400'}`}>{showDeleted ? '返回記錄' : '回收桶'}</button>
          <button disabled={!canEditActiveTrip || showDeleted} onClick={() => canEditActiveTrip && setShowAdd(true)} className={`w-11 h-11 text-white rounded-full flex items-center justify-center shadow-lg ${canEditActiveTrip && !showDeleted ? 'bg-gradient-to-br from-orange-400 to-orange-600 shadow-orange-500/20' : 'bg-zinc-800 text-zinc-500'}`}><IconPlus className="w-5 h-5" /></button>
        </div>
      </div>

      {isTripArchived && (
        <div className="bg-amber-500/10 border border-amber-500/30 rounded-xl px-3 py-2 text-[11px] text-amber-200">
          旅程已封存，紀錄只供查看。
        </div>
      )}

      <div className="bg-zinc-950 border border-zinc-900 rounded-xl p-1 flex">
        <button onClick={() => setView('date')} className={`flex-1 py-2 rounded-lg text-sm ${view === 'date' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-500'}`}>按日期</button>
        <button onClick={() => setView('category')} className={`flex-1 py-2 rounded-lg text-sm ${view === 'category' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-500'}`}>按類別</button>
      </div>

      {visibleExpenses.length === 0 && (
        <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-8 text-center">
          <div className="text-4xl mb-2">📝</div>
          <div className="text-zinc-500 text-sm mb-3">還沒有任何記錄</div>
          <button disabled={!canEditActiveTrip} onClick={() => canEditActiveTrip && setShowAdd(true)} className={`font-medium text-sm ${canEditActiveTrip ? 'text-orange-500' : 'text-zinc-600'}`}>+ 新增一筆</button>
        </div>
      )}

      {!showDeleted && view === 'date' && sortedDates.map(date => {
        const items = grouped[date];
        const dayTotal = items.reduce((s, e) => s + e.amount, 0);
        const dObj = new Date(date);
        const dow = ['日','一','二','三','四','五','六'][dObj.getDay()];
        return (
          <div key={date} className="space-y-2">
            <div className="flex justify-between items-baseline px-1">
              <div className="text-sm font-medium text-zinc-300">{date}（{dow}）</div>
              <div className="text-xs text-zinc-500">{formatMoney(dayTotal, settings.fromCurrency)}</div>
            </div>
            {items.map(e => <ExpenseCard key={e.id} expense={e} members={members} settings={settings} currentRate={currentRate} onClick={canEditActiveTrip ? () => setEditExpense(e) : undefined} />)}
          </div>
        );
      })}

      {!showDeleted && view === 'category' && Object.keys(byCategory).map(catId => {
        const cat = CATEGORIES.find(c => c.id === catId);
        const { items, total: catTotal } = byCategory[catId];
        return (
          <div key={catId} className="space-y-2">
            <div className="flex justify-between items-baseline px-1">
              <div className="text-sm font-medium flex items-center gap-2" style={{ color: cat?.color }}><span>{cat?.emoji}</span> {cat?.name}</div>
              <div className="text-xs text-zinc-500">{formatMoney(catTotal, settings.fromCurrency)}</div>
            </div>
            {items.map(e => <ExpenseCard key={e.id} expense={e} members={members} settings={settings} currentRate={currentRate} onClick={canEditActiveTrip ? () => setEditExpense(e) : undefined} />)}
          </div>
        );
      })}

      {showDeleted && (
        <div className="space-y-2">
          {visibleExpenses.map(e => (
            <div key={e.id} className="bg-zinc-950 border border-zinc-800 rounded-xl p-3 flex items-center gap-3">
              <div className="flex-1">
                <div className="text-white text-sm">{e.name}</div>
                <div className="text-xs text-zinc-500">{e.date} · {formatMoney(e.amount, settings.fromCurrency)}</div>
              </div>
              <button disabled={!canEditActiveTrip} onClick={() => canEditActiveTrip && restoreExpense(e.id)} className="px-3 py-1.5 text-xs rounded-lg bg-green-500/20 text-green-300 disabled:opacity-40">還原</button>
            </div>
          ))}
        </div>
      )}

      {canEditActiveTrip && !showDeleted && (showAdd || editExpense) && (
        <ExpenseEditor
          expense={editExpense}
          members={members}
          settings={settings}
          onDelete={editExpense ? () => { handleDelete(editExpense.id); setEditExpense(null); } : null}
          onClose={() => { setShowAdd(false); setEditExpense(null); }}
          onSave={(data) => {
            if (editExpense) upsertExpense({ ...editExpense, ...data });
            else upsertExpense(data);
            setShowAdd(false); setEditExpense(null);
          }}
        />
      )}
    </div>
  );
}

function DarkField({ label, children }) {
  return <div className="space-y-2"><label className="block text-xs text-zinc-500 uppercase tracking-wider">{label}</label>{children}</div>;
}

function ExpenseEditor({ expense, members, settings, onClose, onSave, onDelete }) {
  const [name, setName] = useState(expense?.name || '');
  const [amount, setAmount] = useState(expense?.amount?.toString() || '');
  const [category, setCategory] = useState(expense?.category || 'food');
  const [paymentMethod, setPaymentMethod] = useState(expense?.paymentMethod || 'cash');
  const [paidBy, setPaidBy] = useState(expense?.paidBy || members[0]?.id || '');
  const [splitAmong, setSplitAmong] = useState(expense?.splitAmong || members.map(m => m.id));
  const [splitTarget, setSplitTarget] = useState(expense?.splitTarget || 'all');
  const [location, setLocation] = useState(expense?.location || '');
  const [note, setNote] = useState(expense?.note || '');
  const [date, setDate] = useState(expense?.date || new Date().toISOString().split('T')[0]);
  const [expenseDateTime, setExpenseDateTime] = useState(expense?.expenseDateTime || `${new Date().toISOString().split('T')[0]}T12:00`);
  const [transactionType, setTransactionType] = useState(expense?.transactionType || 'shared');
  const [splitMode, setSplitMode] = useState(expense?.splitMode || 'equal');
  const [manualSplit, setManualSplit] = useState(expense?.manualSplit || {});

  const toggleSplit = (id) => setSplitAmong(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  const amountNum = parseFloat(amount || '0') || 0;
  const manualTotal = splitAmong.reduce((sum, id) => sum + (parseFloat(manualSplit[id] || 0) || 0), 0);

  useEffect(() => {
    if (transactionType === 'personal') {
      setSplitAmong(paidBy ? [paidBy] : []);
      setSplitTarget('self');
    }
  }, [transactionType, paidBy]);

  useEffect(() => {
    if (splitTarget === 'all') setSplitAmong(members.map(m => m.id));
    if (splitTarget === 'self') setSplitAmong(paidBy ? [paidBy] : []);
  }, [splitTarget, members, paidBy]);

  useEffect(() => {
    setManualSplit((prev) => {
      const next = { ...prev };
      Object.keys(next).forEach((id) => {
        if (!splitAmong.includes(id)) delete next[id];
      });
      return next;
    });
  }, [splitAmong]);

  const handleSave = () => {
    if (!name || !amount) { alert('請填寫名稱和金額'); return; }
    if (members.length > 0 && splitAmong.length === 0) { alert('請選擇至少一個分擔者'); return; }
    if (splitMode === 'manual' && transactionType !== 'personal') {
      if (manualTotal <= 0) { alert('手動分帳金額未填'); return; }
      if (Math.abs(manualTotal - amountNum) > 1) { alert(`手動分帳總和(${manualTotal.toFixed(1)})同金額(${amountNum.toFixed(1)})不一致`); return; }
    }
    onSave({ name, amount: amountNum, category, paymentMethod, paidBy, splitAmong, splitTarget, manualSplit, location, note, date, expenseDateTime, transactionType, splitMode });
  };

  return (
    <div className="fixed inset-0 bg-black/80 z-50 flex items-end backdrop-blur-sm" onClick={onClose}>
      <div className="bg-zinc-900 w-full rounded-t-3xl p-5 max-h-[92vh] overflow-y-auto border-t border-zinc-800 safe-bottom" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-5">
          <h2 className="text-xl font-bold text-white">{expense ? '編輯消費' : '新增消費'}</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center"><IconX className="w-4 h-4 text-zinc-400" /></button>
        </div>
        <div className="space-y-4">
          <DarkField label="名稱"><input value={name} onChange={e => setName(e.target.value)} placeholder="例如：咖啡、麵包" className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500 placeholder-zinc-500" /></DarkField>
          <DarkField label={`金額（${settings.fromCurrency}）`}>
            <div className="relative">
              <span className="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-xl">{getCurrencySymbol(settings.fromCurrency)}</span>
              <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0" className="w-full pl-12 pr-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500 text-2xl font-bold placeholder-zinc-600" />
            </div>
          </DarkField>
          <DarkField label="類別">
            <div className="grid grid-cols-4 gap-2">
              {CATEGORIES.map(c => (
                <button key={c.id} onClick={() => setCategory(c.id)} className={`py-3 rounded-xl flex flex-col items-center gap-0.5 ${category === c.id ? 'text-white' : 'bg-zinc-800 text-zinc-400'}`} style={category === c.id ? { backgroundColor: c.color } : {}}>
                  <span className="text-lg">{c.emoji}</span><span className="text-[10px]">{c.name}</span>
                </button>
              ))}
            </div>
          </DarkField>
          <DarkField label="支付方式">
            <div className="grid grid-cols-4 gap-2">
              {PAYMENT_METHODS.map(p => (
                <button key={p.id} onClick={() => setPaymentMethod(p.id)} className={`py-2.5 rounded-xl text-sm ${paymentMethod === p.id ? 'bg-orange-500 text-white font-medium' : 'bg-zinc-800 text-zinc-400'}`}>{p.name}</button>
              ))}
            </div>
          </DarkField>
          <DarkField label="交易類型">
            <div className="grid grid-cols-2 gap-2">
              <button onClick={() => setTransactionType('shared')} className={`py-2.5 rounded-xl text-sm ${transactionType === 'shared' ? 'bg-orange-500 text-white font-medium' : 'bg-zinc-800 text-zinc-400'}`}>共同分帳</button>
              <button onClick={() => { setTransactionType('personal'); setSplitAmong([paidBy]); }} className={`py-2.5 rounded-xl text-sm ${transactionType === 'personal' ? 'bg-orange-500 text-white font-medium' : 'bg-zinc-800 text-zinc-400'}`}>個人消費</button>
            </div>
          </DarkField>
          <DarkField label="分帳方式">
            <div className="grid grid-cols-2 gap-2">
              <button onClick={() => setSplitMode('equal')} className={`py-2.5 rounded-xl text-sm ${splitMode === 'equal' ? 'bg-orange-500 text-white font-medium' : 'bg-zinc-800 text-zinc-400'}`}>平均分</button>
              <button onClick={() => setSplitMode('manual')} className={`py-2.5 rounded-xl text-sm ${splitMode === 'manual' ? 'bg-orange-500 text-white font-medium' : 'bg-zinc-800 text-zinc-400'}`}>手動輸入（Round2）</button>
            </div>
          </DarkField>
          {members.length > 0 && (
            <>
              <DarkField label="誰付款">
                <div className="flex gap-2 overflow-x-auto pb-1">
                  {members.map(m => (
                    <button key={m.id} onClick={() => setPaidBy(m.id)} className={`flex-shrink-0 flex flex-col items-center gap-1 p-2 rounded-xl min-w-[60px] ${paidBy === m.id ? 'bg-orange-500/20 ring-2 ring-orange-500' : 'bg-zinc-800'}`}>
                      <MemberAvatar member={m} size={36} /><span className="text-[10px] text-white truncate max-w-[56px]">{m.name}</span>
                    </button>
                  ))}
                </div>
              </DarkField>
              <DarkField label={`由誰分擔（${splitAmong.length} 人）`}>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={() => setSplitTarget('all')} className={`py-2 text-xs rounded-lg ${splitTarget === 'all' ? 'bg-orange-500 text-white' : 'bg-zinc-800 text-zinc-300'}`}>全部</button>
                  <button onClick={() => setSplitTarget('self')} className={`py-2 text-xs rounded-lg ${splitTarget === 'self' ? 'bg-orange-500 text-white' : 'bg-zinc-800 text-zinc-300'}`}>只有付款人</button>
                </div>
                <button onClick={() => setSplitTarget('custom')} className={`w-full mt-2 py-2 text-xs rounded-lg ${splitTarget === 'custom' ? 'bg-orange-500 text-white' : 'bg-zinc-800 text-zinc-300'}`}>自選</button>
                <div className="space-y-2 mt-2">
                  {members.map(m => {
                    const active = splitAmong.includes(m.id);
                    return (
                      <button key={m.id} onClick={() => { if (splitTarget !== 'custom') setSplitTarget('custom'); toggleSplit(m.id); }} className={`w-full flex items-center gap-3 p-2.5 rounded-xl ${active ? 'bg-orange-500/10 border border-orange-500/50' : 'bg-zinc-800 border border-transparent'}`}>
                        <MemberAvatar member={m} size={32} />
                        <span className="flex-1 text-left text-white text-sm">{m.name}</span>
                        {active && amount && splitMode !== 'manual' && <span className="text-xs text-orange-400">{formatMoney(parseFloat(amount) / splitAmong.length, settings.fromCurrency)}</span>}
                        <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${active ? 'bg-orange-500 border-orange-500' : 'border-zinc-600'}`}>{active && <IconCheck className="w-3 h-3 text-white" />}</div>
                      </button>
                    );
                  })}
                </div>
                {splitMode === 'manual' && splitAmong.length > 0 && (
                  <div className="mt-2 space-y-2">
                    {splitAmong.map(id => {
                      const m = members.find(x => x.id === id);
                      return (
                        <div key={id} className="flex items-center gap-2">
                          <span className="text-xs text-zinc-400 w-16 truncate">{m?.name || id}</span>
                          <input
                            type="number"
                            value={manualSplit[id] ?? ''}
                            onChange={(e) => setManualSplit(s => ({ ...s, [id]: e.target.value }))}
                            placeholder="0"
                            className="flex-1 px-3 py-2 bg-zinc-900 text-white rounded-lg text-sm"
                          />
                        </div>
                      );
                    })}
                    <div className={`text-[10px] ${Math.abs(manualTotal - amountNum) <= 1 ? 'text-green-400' : 'text-amber-400'}`}>
                      手動總和：{manualTotal.toFixed(1)} / 金額：{amountNum.toFixed(1)}
                    </div>
                  </div>
                )}
              </DarkField>
            </>
          )}
          <DarkField label="地點（選填）"><input value={location} onChange={e => setLocation(e.target.value)} placeholder="例如：Lawson" className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500 placeholder-zinc-500" /></DarkField>
          <DarkField label="消費日期時間"><input type="datetime-local" value={expenseDateTime} onChange={e => setExpenseDateTime(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500" style={{ colorScheme: 'dark' }} /></DarkField>
          <DarkField label="日期"><input type="date" value={date} onChange={e => setDate(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500" style={{ colorScheme: 'dark' }} /></DarkField>
          <DarkField label="備註"><textarea value={note} onChange={e => setNote(e.target.value)} placeholder="選填" className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500 min-h-[84px]" /></DarkField>
          <div className="flex gap-2 pt-2">
            {onDelete && <button onClick={onDelete} className="px-5 py-4 bg-red-500/10 text-red-400 rounded-2xl"><IconTrash className="w-5 h-5" /></button>}
            <button onClick={handleSave} className="flex-1 py-4 bg-gradient-to-br from-orange-400 to-orange-600 text-white font-bold rounded-2xl shadow-lg shadow-orange-500/20">{expense ? '儲存修改' : '新增'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ========== ScanTab ==========
function ScanTab({ addMultipleExpenses, members, settings, onDone, isTripArchived }) {
  const [image, setImage] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
  const [showApiKey, setShowApiKey] = useState(false);
  const fileRef = useRef(null);

  const handleFile = (file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => { setImage(r.result); setResult(null); setError(''); };
    r.readAsDataURL(file);
  };

  const analyzeReceipt = async () => {
    if (!image) return;
    if (!apiKey) { setShowApiKey(true); return; }
    setLoading(true); setError('');
    try {
      const base64 = image.split(',')[1];
      const mediaType = image.match(/data:(.*?);/)[1];
      const prompt = "你係收據辨識助手。分析呢張收據，只輸出 JSON（唔好有 markdown 代碼標記）：\n\n{\n  \"store\": \"商店名稱（繁體中文，日文店名可以保留）\",\n  \"date\": \"YYYY-MM-DD（睇唔到就用今日）\",\n  \"items\": [\n    { \"name\": \"商品名（繁中）\", \"price\": 單價數字, \"qty\": 數量, \"category\": \"food|transport|shopping|accommodation|ticket|entertainment|medicine|other\" }\n  ]\n}\n\n重要：\n- 如果一樣嘢買咗多件，qty 就係件數，price 係單價\n- 只提取明細嘅商品，唔好包含「小計」「合計」「稅」\n- 類別：food=餐飲, transport=交通, shopping=購物, accommodation=酒店, ticket=門票, entertainment=娛樂, medicine=藥品, other=其他";

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: mediaType, data: base64 } },
              { text: prompt }
            ]
          }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 2000 }
        })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || '辨識失敗');
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      const expanded = [];
      parsed.items.forEach(it => {
        const qty = it.qty || 1;
        for (let i = 0; i < qty; i++) {
          expanded.push({
            ...it, qty: 1, _id: Math.random().toString(36).slice(2),
            paidBy: members[0]?.id || '',
            splitAmong: members.map(m => m.id),
            _originalQty: qty, _itemIdx: i + 1,
          });
        }
      });
      setResult({ store: parsed.store, date: parsed.date, items: expanded });
    } catch (e) {
      setError('辨識失敗：' + e.message);
    }
    setLoading(false);
  };

  const updateItem = (id, patch) => setResult(r => ({ ...r, items: r.items.map(it => it._id === id ? { ...it, ...patch } : it) }));
  const deleteItem = (id) => setResult(r => ({ ...r, items: r.items.filter(it => it._id !== id) }));

  const confirmSave = () => {
    if (!result || !result.items.length) return;
    const newExpenses = result.items.map((item) => ({
      name: item.name, amount: item.price, category: item.category || 'other',
      paymentMethod: 'cash', paidBy: item.paidBy, splitAmong: item.splitAmong,
      location: result.store, date: result.date || new Date().toISOString().split('T')[0],
    }));
    addMultipleExpenses(newExpenses);
    setImage(null); setResult(null); onDone();
  };

  const totalResult = result?.items.reduce((s, i) => s + i.price, 0) || 0;

  return (
    <div className="px-5 safe-top pt-16 pb-4 space-y-4">
      <div>
        <h1 className="text-3xl font-bold text-white">掃描收據</h1>
        <p className="text-xs text-zinc-500 mt-1">AI 拆分每件商品，分別指派俾唔同嘅人</p>
      </div>

      {isTripArchived && (
        <div className="bg-amber-500/10 border border-amber-500/30 rounded-xl px-3 py-2 text-[11px] text-amber-200">
          旅程已封存，不能新增收據紀錄。
        </div>
      )}

      {showApiKey && (
        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-5" onClick={() => setShowApiKey(false)}>
          <div className="bg-zinc-900 rounded-2xl p-5 w-full max-w-sm" onClick={e => e.stopPropagation()}>
            <h3 className="text-white font-bold mb-2">設定 Gemini API Key</h3>
            <p className="text-xs text-zinc-500 mb-3">OCR 需要 Google Gemini 嘅免費 API key。去 <span className="text-orange-400">aistudio.google.com/apikey</span> 取得（免費）。Key 只會存喺你手機，唔會上傳任何地方。</p>
            <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="AIza..." className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none text-sm" />
            <button onClick={() => { localStorage.setItem('gemini_api_key', apiKey); setShowApiKey(false); }} className="w-full mt-3 py-3 bg-orange-500 text-white rounded-xl font-medium">儲存</button>
          </div>
        </div>
      )}

      <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-4">
        {!image ? (
          <>
            <button disabled={isTripArchived} onClick={() => fileRef.current?.click()} className="w-full py-12 border-2 border-dashed border-zinc-800 rounded-2xl flex flex-col items-center gap-2 text-zinc-500 disabled:opacity-40">
              <IconUpload className="w-8 h-8" /><span className="text-sm">點擊拍照或上傳</span>
            </button>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={e => handleFile(e.target.files?.[0])} className="hidden" />
            {!apiKey && <button onClick={() => setShowApiKey(true)} className="w-full mt-2 text-xs text-orange-500 py-2">⚠️ 未設定 API key，點擊設定</button>}
          </>
        ) : (
          <div className="space-y-3">
            <img src={image} alt="receipt" className="w-full rounded-xl max-h-72 object-contain bg-black" />
            {!loading && !result && (
              <div className="flex gap-2">
                <button onClick={() => { setImage(null); setResult(null); }} className="flex-1 py-3 bg-zinc-800 text-zinc-300 rounded-xl font-medium">重新選</button>
                <button disabled={isTripArchived} onClick={analyzeReceipt} className="flex-1 py-3 bg-gradient-to-br from-orange-400 to-orange-600 text-white rounded-xl font-medium disabled:opacity-40">AI 辨識</button>
              </div>

function StatsTab({ expenses, settings, members, currentRate }) {
  const activeExpenses = expenses.filter(e => !e.deletedAt);
  const total = activeExpenses.reduce((s, e) => s + e.amount, 0);
  const byCategory = {};
  activeExpenses.forEach(e => { byCategory[e.category] = (byCategory[e.category] || 0) + e.amount; });
  const balances = calculateBalances(activeExpenses, members);
  const memberSpent = {};
  members.forEach(m => memberSpent[m.id] = 0);
  activeExpenses.forEach(exp => {
    const shares = getExpenseShares(exp, members.map(m => m.id));
    Object.entries(shares).forEach(([id, amt]) => { memberSpent[id] = (memberSpent[id] || 0) + amt; });
  });
  const top10 = [...activeExpenses].sort((a, b) => b.amount - a.amount).slice(0, 10);
  const ranking = members.map(m => ({ ...m, spent: memberSpent[m.id] || 0 })).sort((a, b) => b.spent - a.spent);

  return (
    <div className="px-5 safe-top pt-16 pb-4 space-y-4">
      <h1 className="text-3xl font-bold text-white">統計</h1>
      <div className="bg-gradient-to-br from-orange-500 to-orange-700 rounded-3xl p-5 shadow-lg shadow-orange-500/20">
        <div className="text-white/80 text-xs uppercase tracking-wider">旅程總支出</div>
        <div className="text-white text-4xl font-bold mt-1">{formatMoney(total, settings.fromCurrency)}</div>
        <div className="text-white/80 text-sm mt-1">≈ {formatMoney(convert(total, currentRate), settings.toCurrency)}</div>
      </div>
      <div className="bg-zinc-950 border border-zinc-900 rounded-3xl p-5">
        <h2 className="text-sm font-medium text-zinc-400 uppercase tracking-wider mb-4">分類支出</h2>
        <DonutChart data={CATEGORIES.map(c => ({ label: c.name, value: byCategory[c.id] || 0, color: c.color, emoji: c.emoji })).filter(d => d.value > 0)} total={total} settings={settings} />
      </div>
      {members.length > 0 && (
        <div className="bg-zinc-950 border border-zinc-900 rounded-3xl p-5">
          <h2 className="text-sm font-medium text-zinc-400 uppercase tracking-wider mb-4">每人應負擔</h2>
          <div className="space-y-3">
            {members.map(m => {
              const spent = memberSpent[m.id] || 0;
              const bal = balances[m.id] || 0;
              const pct = total > 0 ? (spent / total) * 100 : 0;
              return (
                <div key={m.id} className="flex items-center gap-3">
                  <MemberAvatar member={m} size={40} />
                  <div className="flex-1 min-w-0">
                    <div className="flex justify-between items-baseline mb-1">
                      <span className="text-white font-medium text-sm">{m.name}</span>
                      <span className="text-white text-sm font-bold">{formatMoney(spent, settings.fromCurrency)}</span>
                    </div>
                    <div className="h-2 bg-zinc-900 rounded-full overflow-hidden mb-1"><div className="h-full bg-gradient-to-r from-orange-400 to-orange-600 rounded-full" style={{ width: `${pct}%` }} /></div>
                    <div className="flex justify-between text-[10px]">
                      <span className="text-zinc-500">{pct.toFixed(0)}%</span>
                      <span className={bal > 0.01 ? 'text-green-400' : bal < -0.01 ? 'text-red-400' : 'text-zinc-500'}>
                        {bal > 0.01 ? `應收 ${formatMoney(bal, settings.fromCurrency)}` : bal < -0.01 ? `應付 ${formatMoney(-bal, settings.fromCurrency)}` : '平衡'}
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {ranking.length > 0 && (
        <div className="bg-zinc-950 border border-zinc-900 rounded-3xl p-5">
          <h2 className="text-sm font-medium text-zinc-400 uppercase tracking-wider mb-3">發達排行榜</h2>
          <div className="space-y-2">
            {ranking.map((m, idx) => (
              <div key={m.id} className="flex items-center gap-3">
                <span className="text-xs text-zinc-500 w-4">{idx + 1}</span>
                <MemberAvatar member={m} size={30} />

                <div className="text-right">
                  <div className="text-sm text-white font-bold">{formatMoney(m.spent, settings.fromCurrency)}</div>
                  <div className={`text-[10px] ${idx === 0 ? 'text-amber-400' : idx === ranking.length - 1 ? 'text-cyan-400' : 'text-zinc-500'}`}>{idx === 0 ? '發咗達' : idx === ranking.length - 1 ? '識計數' : ''}</div>
                </div>

            ))}
          </div>
        </div>

                  <div className="flex-1 min-w-0 truncate text-white text-sm">{e.name}</div>
                  <div className="text-right flex-shrink-0"><div className="text-white font-bold text-sm">{formatMoney(e.amount, settings.fromCurrency)}</div></div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function DonutChart({ data, total, settings }) {
  if (data.length === 0 || total === 0) return <div className="text-center py-6 text-zinc-500 text-sm">暫無數據</div>;
  const size = 160, sw = 24, r = (size - sw) / 2, c = 2 * Math.PI * r, cx = size / 2;
  let acc = 0;
  const segs = data.map(d => {
    const pct = d.value / total, len = c * pct, off = c * (acc / total); acc += d.value;
    return { ...d, len, off, pct };
  });
  return (
    <div className="flex items-center gap-4">
      <div className="relative flex-shrink-0">
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {segs.map((s, i) => (<circle key={i} cx={cx} cy={cx} r={r} fill="none" stroke={s.color} strokeWidth={sw} strokeDasharray={`${s.len} ${c}`} strokeDashoffset={-s.off} transform={`rotate(-90 ${cx} ${cx})`} />))}
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <div className="text-[10px] text-zinc-500">TOTAL</div>
          <div className="text-white text-sm font-bold">{formatMoney(total, settings.fromCurrency, true)}</div>
        </div>
      </div>
      <div className="flex-1 space-y-1">
        {segs.map((s, i) => (
          <div key={i} className="flex items-center gap-2 text-xs">
            <div className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: s.color }} />
            <span className="text-zinc-300 flex-1">{s.label}</span>
            <span className="text-zinc-500 text-[10px]">{(s.pct * 100).toFixed(0)}%</span>
            <span className="text-white font-medium w-14 text-right">{formatMoney(s.value, settings.fromCurrency, true)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

      </div>

      <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-4 space-y-3">
        <h2 className="text-sm font-medium text-zinc-400 uppercase tracking-wider">活動記錄</h2>
        <div className="space-y-2 max-h-56 overflow-y-auto">
          {activityLogs.slice(0, 50).map(log => (
            <div key={log.id} className="bg-zinc-900 rounded-xl p-2.5">
              <div className="text-[11px] font-medium" style={{ color: log.color || '#F97316' }}>{log.memberName || 'Unknown'}</div>
              <div className="text-xs text-white mt-0.5">{log.detail}</div>
              <div className="text-[10px] text-zinc-500 mt-0.5">{new Date(log.createdAt || Date.now()).toLocaleString('zh-HK')}</div>
            </div>
          ))}
        </div>
      </div>

      {canManageMembers && (showAddMember || editingMember) && (
        <MemberEditor member={editingMember} onClose={() => { setShowAddMember(false); setEditingMember(null); }}
          onSave={(data) => {
            if (editingMember) upsertMember({ ...editingMember, ...data });
            else upsertMember(data);
            setShowAddMember(false); setEditingMember(null);
          }} />
      )}

      {showCurrencyPicker && (
        <CurrencyPicker current={showCurrencyPicker === 'from' ? settings.fromCurrency : settings.toCurrency}
          title={showCurrencyPicker === 'from' ? '選擇當地貨幣' : '選擇結算貨幣'}
          onClose={() => setShowCurrencyPicker(null)}
          onSelect={(code) => {
            saveSettings({ ...settings, [showCurrencyPicker === 'from' ? 'fromCurrency' : 'toCurrency']: code });
            setShowCurrencyPicker(null);
          }} />
      )}
    </div>
  );
}

function CurrencyPicker({ current, onSelect, onClose, title }) {
  return (
    <div className="fixed inset-0 bg-black/80 z-50 flex items-end backdrop-blur-sm" onClick={onClose}>
      <div className="bg-zinc-900 w-full rounded-t-3xl p-5 max-h-[80vh] overflow-y-auto border-t border-zinc-800 safe-bottom" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-4">
          <h2 className="text-lg font-bold text-white">{title}</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center"><IconX className="w-4 h-4 text-zinc-400" /></button>
        </div>
        <div className="space-y-1">
          {CURRENCIES.map(c => (
            <button key={c.code} onClick={() => onSelect(c.code)} className={`w-full flex items-center gap-3 p-3 rounded-xl ${current === c.code ? 'bg-orange-500/20 ring-1 ring-orange-500' : ''}`}>
              <span className="text-2xl">{c.flag}</span>
              <div className="flex-1 text-left"><div className="text-white font-medium">{c.code}</div><div className="text-xs text-zinc-500">{c.name}</div></div>
              <span className="text-zinc-500">{c.symbol}</span>
              {current === c.code && <IconCheck className="w-4 h-4 text-orange-500" />}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function MemberEditor({ member, onClose, onSave }) {
  const [name, setName] = useState(member?.name || '');
  const [avatar, setAvatar] = useState(member?.avatar || '');
  const [color, setColor] = useState(member?.color || '#FF8C00');
  const [role, setRole] = useState(member?.role || 'editor');
  const fileRef = useRef(null);
  const colors = ['#FF8C00', '#EF4444', '#8B5CF6', '#06B6D4', '#10B981', '#EC4899', '#F59E0B', '#6366F1'];

  const handleAvatar = (file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 240;
        const size = Math.min(img.width, img.height);
        const sx = (img.width - size) / 2;
        const sy = (img.height - size) / 2;
        canvas.width = max; canvas.height = max;
        canvas.getContext('2d').drawImage(img, sx, sy, size, size, 0, 0, max, max);
        setAvatar(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = r.result;
    };
    r.readAsDataURL(file);
  };

  const handleSave = () => {
    if (!name.trim()) { alert('請輸入名字'); return; }
    onSave({ name: name.trim(), avatar, color, role });
  };

  return (
    <div className="fixed inset-0 bg-black/80 z-50 flex items-end backdrop-blur-sm" onClick={onClose}>
      <div className="bg-zinc-900 w-full rounded-t-3xl p-5 border-t border-zinc-800 safe-bottom" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-5">
          <h2 className="text-xl font-bold text-white">{member ? '編輯旅伴' : '新增旅伴'}</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center"><IconX className="w-4 h-4 text-zinc-400" /></button>
        </div>
        <div className="space-y-4">
          <div className="flex justify-center">
            <button onClick={() => fileRef.current?.click()} className="relative">
              {avatar ? (
                <img src={avatar} className="w-24 h-24 rounded-full object-cover ring-4 ring-zinc-800" alt="" />
              ) : (
                <div className="w-24 h-24 rounded-full flex items-center justify-center text-4xl font-bold text-white ring-4 ring-zinc-800" style={{ backgroundColor: color }}>{name[0] || '?'}</div>
              )}
              <div className="absolute bottom-0 right-0 w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center shadow-lg"><IconCamera className="w-4 h-4 text-white" /></div>
            </button>
            <input ref={fileRef} type="file" accept="image/*" onChange={e => handleAvatar(e.target.files?.[0])} className="hidden" />
          </div>
          <p className="text-center text-[10px] text-zinc-500">點擊更換頭像</p>
          <DarkField label="名字"><input value={name} onChange={e => setName(e.target.value)} placeholder="例如：Ricky" className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500" /></DarkField>
          {!avatar && (
            <DarkField label="顏色">
              <div className="flex gap-2 flex-wrap">
                {colors.map(c => <button key={c} onClick={() => setColor(c)} className={`w-9 h-9 rounded-full ${color === c ? 'ring-2 ring-white scale-110' : ''}`} style={{ backgroundColor: c }} />)}
              </div>
            </DarkField>
          )}
          <DarkField label="角色">
            <div className="grid grid-cols-3 gap-2">
              {['admin', 'editor', 'viewer'].map(r => (
                <button key={r} onClick={() => setRole(r)} className={`py-2 rounded-xl text-xs uppercase ${role === r ? 'bg-orange-500 text-white' : 'bg-zinc-800 text-zinc-400'}`}>{r}</button>
              ))}
            </div>
          </DarkField>
          {avatar && <button onClick={() => setAvatar('')} className="w-full py-2 text-sm text-zinc-400 bg-zinc-800 rounded-xl">移除頭像</button>}
          <button onClick={handleSave} className="w-full py-4 bg-gradient-to-br from-orange-400 to-orange-600 text-white font-bold rounded-2xl shadow-lg shadow-orange-500/20">儲存</button>
        </div>
      </div>
    </div>
  );
}

function IdentityPicker({ members, tripId, onSelect }) {
  return (
    <div className="fixed inset-0 bg-black/90 z-[60] flex items-end backdrop-blur-sm">
      <div className="bg-zinc-900 w-full rounded-t-3xl p-5 border-t border-zinc-800 safe-bottom">
        <h2 className="text-xl font-bold text-white">你係邊個？</h2>
        <p className="text-xs text-zinc-500 mt-1">旅程 #{tripId}。第一位入旅程嘅人會自動成為 Admin。</p>
        <div className="mt-4 space-y-2 max-h-[50vh] overflow-y-auto">
          {members.map(m => (
            <button key={m.id} onClick={() => onSelect(m.id)} className="w-full flex items-center gap-3 p-3 bg-zinc-800 rounded-xl">
              <MemberAvatar member={m} size={36} />
              <div className="flex-1 text-left">
                <div className="text-white">{m.name}</div>
                <div className="text-[10px] text-zinc-500 uppercase">{(m.role || 'editor')}</div>
              </div>
              <IconChevron className="w-4 h-4 text-zinc-500" />
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ========== 啟動 ==========
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
