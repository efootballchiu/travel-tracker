<script>
(function(){
  // 只係 React 未 mount 時先 show error panel（即 #root 仲係空）
  function rootEmpty(){
    var root = document.getElementById('root');
    return root && root.childElementCount === 0;
  }
  function showErr(msg){
    if(!rootEmpty()) return; // React 已 mount 就唔覆蓋畫面
    var el = document.getElementById('err-panel');
    if(!el) return;
    el.style.display = 'block';
    el.textContent = (el.textContent ? el.textContent + '\n\n---\n\n' : '') + msg;
  }
  window.addEventListener('error', function(e){
    showErr('[ERROR] ' + (e.message || e.error) + '\n' + (e.filename||'') + ':' + (e.lineno||'') + ':' + (e.colno||'') + '\n' + ((e.error && e.error.stack) || ''));
  });
  window.addEventListener('unhandledrejection', function(e){
    var msg = (e.reason && (e.reason.message || e.reason)) + '';
    // 忽略 Firestore persistence warning（唔影響功能）
    if (msg.indexOf('persistence') !== -1 || msg.indexOf('exclusive access') !== -1) return;
    showErr('[PROMISE REJECTED] ' + msg + '\n' + ((e.reason && e.reason.stack) || ''));
  });
  // 5 秒後如果 root 仲係空，show hint
  setTimeout(function(){
    if(rootEmpty()){
      showErr('[HINT] React 冇 mount 到。可能原因：\n1. CDN block（Tailwind / React / Babel）\n2. Babel 轉換失敗\n3. JSX runtime error');
    }
  }, 5000);
})();
</script>

// ========== Color helpers ==========
function hexToRgb(hex) {
  const h = hex.replace('#', '');
  if (h.length !== 6) return { r: 255, g: 140, b: 0 };
  return { r: parseInt(h.slice(0,2),16), g: parseInt(h.slice(2,4),16), b: parseInt(h.slice(4,6),16) };
}
function rgbToHex(r, g, b) {
  const clamp = (v) => Math.max(0, Math.min(255, Math.round(v)));
  const to2 = (v) => clamp(v).toString(16).padStart(2, '0');
  return '#' + to2(r) + to2(g) + to2(b);
}
// 相對亮度（WCAG）
function relLum({ r, g, b }) {
  const ch = (v) => { v /= 255; return v <= 0.03928 ? v/12.92 : Math.pow((v+0.055)/1.055, 2.4); };
  return 0.2126 * ch(r) + 0.7152 * ch(g) + 0.0722 * ch(b);
}
// 黑底下，若文字太暗就 lighten 到最低可讀度
function ensureReadableColor(hex) {
  if (!hex || typeof hex !== 'string') return '#FF8C00';
  const rgb = hexToRgb(hex);
  let lum = relLum(rgb);
  if (lum >= 0.18) return hex;
  // 與白色 blend 到 lum ~= 0.3
  let t = 0;
  let { r, g, b } = rgb;
  while (lum < 0.28 && t < 1) {
    t += 0.08;
    r = rgb.r + (255 - rgb.r) * t;
    g = rgb.g + (255 - rgb.g) * t;
    b = rgb.b + (255 - rgb.b) * t;
    lum = relLum({ r, g, b });
  }
  return rgbToHex(r, g, b);
}

// ========== URL hash routing ==========
// 格式：
//   (empty or #/)              → trip list
//   #/trip/{tripId}            → enter trip
//   #/trip/{tripId}?invite=xxx → enter trip via invite token
function parseRoute() {
  const hash = window.location.hash || '';
  const m = hash.match(/^#\/trip\/([A-Za-z0-9_-]+)(?:\?invite=([A-Za-z0-9_-]+))?/);
  if (m) return { kind: 'trip', tripId: m[1], invite: m[2] || null };
  return { kind: 'list' };
}
function setRoute(route) {
  if (route.kind === 'list') window.location.hash = '#/';
  else if (route.kind === 'trip') {
    const inv = route.invite ? `?invite=${route.invite}` : '';
    window.location.hash = '#/trip/' + route.tripId + inv;
  }
}
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

// ========== Owner 系統 ==========
// trips/_meta/owner doc 存 { secretHash, createdAt }
// 本機 localStorage 'owner_secret' 記住自己嘅 secret
// 兩部裝置之間 sync owner 身分：第二部裝置貼返 secret 就認

async function sha256(text) {
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}
function genOwnerSecret() {
  // 易讀格式：xxxx-xxxx-xxxx
  const part = () => Math.random().toString(36).slice(2, 6);
  return `chiu-${part()}-${part()}-${part()}`;
}
function getLocalOwnerSecret() { return localStorage.getItem('owner_secret') || ''; }
function setLocalOwnerSecret(s) { if (s) localStorage.setItem('owner_secret', s); else localStorage.removeItem('owner_secret'); }

// 朋友本機已 join 過嘅 trip ids（一旦揀過 identity 就記低）
function getJoinedTrips() {
  try { return JSON.parse(localStorage.getItem('joined_trips') || '[]'); }
  catch { return []; }
}
function addJoinedTrip(tripId) {
  const arr = getJoinedTrips();
  if (!arr.includes(tripId)) {
    arr.push(tripId);
    localStorage.setItem('joined_trips', JSON.stringify(arr));
  }
}
function tripShareUrl(tripId) {
  const base = window.location.origin + window.location.pathname;
  return base + '#/trip/' + tripId;
}
async function shareTrip(tripId, tripName) {
  const url = tripShareUrl(tripId);
  const title = tripName || '旅程';
  try {
    if (navigator.share) {
      await navigator.share({ title, text: '一齊記帳：' + title, url });
      return { ok: true, method: 'share' };
    }
  } catch (e) {
    if (e && e.name === 'AbortError') return { ok: false, method: 'cancelled' };
  }
  try {
    await navigator.clipboard.writeText(url);
    return { ok: true, method: 'clipboard' };
  } catch (e) {
    return { ok: false, method: 'fail', url };
  }
}

// ========== 匯率（3-fallback） ==========
async function fetchExchangeRate(from, to) {
  // 1. open.er-api.com
  try {
    const res = await fetch(`https://open.er-api.com/v6/latest/${from}`);
    const data = await res.json();
    if (data?.result === 'success' && data.rates?.[to]) {
      return { rate: data.rates[to], timestamp: (data.time_last_update_unix || Math.floor(Date.now()/1000)) * 1000, source: 'er-api' };
    }
  } catch (e) {}
  // 2. jsdelivr Fawaz currency-api
  try {
    const res = await fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/${from.toLowerCase()}.json`);
    const data = await res.json();
    const bucket = data?.[from.toLowerCase()];
    if (bucket && bucket[to.toLowerCase()]) {
      return { rate: bucket[to.toLowerCase()], timestamp: Date.now(), source: 'jsdelivr' };
    }
  } catch (e) {}
  // 3. cloudflare pages Fawaz mirror
  try {
    const res = await fetch(`https://latest.currency-api.pages.dev/v1/currencies/${from.toLowerCase()}.json`);
    const data = await res.json();
    const bucket = data?.[from.toLowerCase()];
    if (bucket && bucket[to.toLowerCase()]) {
      return { rate: bucket[to.toLowerCase()], timestamp: Date.now(), source: 'cloudflare' };
    }
  } catch (e) {}
  return null;
}

function getCurrencySymbol(code) { return CURRENCIES.find(c => c.code === code)?.symbol || code; }
function formatMoney(amount, code, short = false) {
  const sym = getCurrencySymbol(code);
  if (short && Math.abs(amount) >= 10000) return sym + (amount / 1000).toFixed(1) + 'k';
  return sym + Math.round(amount).toLocaleString();
}
function convert(amount, rate) { return (!rate || !rate.rate) ? 0 : amount * rate.rate; }

function calculateBalances(expenses, members) {
  const balances = {};
  members.forEach(m => balances[m.id] = 0);
  expenses.forEach(exp => {
    if (exp.deleted) return;
    if (exp.txType === 'personal') return; // 個人消費完全唔入結算
    if (!exp.paidBy || !exp.splitAmong || exp.splitAmong.length === 0) return;
    balances[exp.paidBy] = (balances[exp.paidBy] || 0) + exp.amount;
    if (exp.splitMode === 'manual' && exp.splitAmounts) {
      // 手動金額：用每人指定金額
      exp.splitAmong.forEach(mid => {
        const share = parseFloat(exp.splitAmounts[mid]) || 0;
        balances[mid] = (balances[mid] || 0) - share;
      });
    } else {
      // 平均分
      const perPerson = exp.amount / exp.splitAmong.length;
      exp.splitAmong.forEach(mid => { balances[mid] = (balances[mid] || 0) - perPerson; });
    }
  });
  return balances;
}

// 每人實際花費（用於排行榜 + 統計）：個人消費 + 共同分擔嘅份
function calculateMemberSpending(expenses, members) {
  const spent = {};
  members.forEach(m => spent[m.id] = 0);
  expenses.forEach(exp => {
    if (exp.deleted) return;
    if (exp.txType === 'personal') {
      // 個人消費：全數算畀付款人
      if (exp.paidBy) spent[exp.paidBy] = (spent[exp.paidBy] || 0) + exp.amount;
      return;
    }
    if (!exp.splitAmong || exp.splitAmong.length === 0) return;
    if (exp.splitMode === 'manual' && exp.splitAmounts) {
      exp.splitAmong.forEach(mid => {
        spent[mid] = (spent[mid] || 0) + (parseFloat(exp.splitAmounts[mid]) || 0);
      });
    } else {
      const per = exp.amount / exp.splitAmong.length;
      exp.splitAmong.forEach(mid => { spent[mid] = (spent[mid] || 0) + per; });
    }
  });
  return spent;
}

function simplifyTransfers(balances) {
  const creditors = [], debtors = [];
  Object.entries(balances).forEach(([id, bal]) => {
    if (bal > 0.01) creditors.push({ id, amount: bal });
    else if (bal < -0.01) debtors.push({ id, amount: -bal });
  });
  creditors.sort((a, b) => b.amount - a.amount);
  debtors.sort((a, b) => b.amount - a.amount);
  const transfers = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const amt = Math.min(debtors[i].amount, creditors[j].amount);
    if (amt > 0.01) transfers.push({ from: debtors[i].id, to: creditors[j].id, amount: amt });
    debtors[i].amount -= amt;
    creditors[j].amount -= amt;
    if (debtors[i].amount < 0.01) i++;
    if (creditors[j].amount < 0.01) j++;
  }
  return transfers;
}

// ========== Root App：route dispatcher ==========
function App() {
  const [fbReady, setFbReady] = useState(!!window.__firebase);
  const [route, setRouteState] = useState(() => parseRoute());
  const [online, setOnline] = useState(navigator.onLine);
  const [ownerHash, setOwnerHash] = useState(null); // null = 未 set / loading; '' = 未有 owner; string = hash
  const [isOwner, setIsOwner] = useState(false);

  useEffect(() => {
    if (fbReady) return;
    const handler = () => setFbReady(true);
    window.addEventListener('firebase-ready', handler);
    return () => window.removeEventListener('firebase-ready', handler);
  }, [fbReady]);

  // 訂閱 owner doc + verify local secret
  useEffect(() => {
    if (!fbReady) return;
    const { db, doc, onSnapshot } = window.__firebase;
    const unsub = onSnapshot(doc(db, 'trips', '_meta'), async (snap) => {
      const data = snap.exists() ? snap.data() : null;
      const hash = data?.ownerHash || '';
      setOwnerHash(hash);
      const localSecret = getLocalOwnerSecret();
      if (!hash || !localSecret) { setIsOwner(false); return; }
      try {
        const localHash = await sha256(localSecret);
        setIsOwner(localHash === hash);
      } catch (e) { setIsOwner(false); }
    });
    return () => unsub();
  }, [fbReady]);

  useEffect(() => {
    const onHash = () => setRouteState(parseRoute());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  useEffect(() => {
    const onOnline = () => setOnline(true);
    const onOffline = () => setOnline(false);
    window.addEventListener('online', onOnline);
    window.addEventListener('offline', onOffline);
    return () => {
      window.removeEventListener('online', onOnline);
      window.removeEventListener('offline', onOffline);
    };
  }, []);

  if (!fbReady) {
    return (
      <div className="h-screen w-full flex items-center justify-center bg-black">
        <div className="flex flex-col items-center gap-3">
          <IconLoader className="w-8 h-8 animate-spin text-orange-500" />
          <div className="text-zinc-500 text-xs">連接雲端中...</div>
        </div>
      </div>
    );
  }

  const ownerCtx = { isOwner, ownerHash, setIsOwner };

  if (route.kind === 'list') {
    return <TripListScreen online={online} ownerCtx={ownerCtx} />;
  }
  return <TripApp key={route.tripId} tripId={route.tripId} online={online} ownerCtx={ownerCtx} route={route} />;
}

// ========== TripListScreen ==========
function TripListScreen({ online, ownerCtx }) {
  const [trips, setTrips] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showNew, setShowNew] = useState(false);
  const [editTrip, setEditTrip] = useState(null);
  const [shareToast, setShareToast] = useState('');
  const [showPast, setShowPast] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [deleting, setDeleting] = useState(false);
  const [showOwnerSetup, setShowOwnerSetup] = useState(false);
  const { isOwner, ownerHash } = ownerCtx;
  const joinedIds = getJoinedTrips();

  useEffect(() => {
    const { db, collection, onSnapshot } = window.__firebase;
    const tripsRef = collection(db, 'trips');
    const unsub = onSnapshot(tripsRef, (snap) => {
      const list = [];
      let hasDefaultTombstone = false;
      snap.forEach(d => {
        if (d.id === '_meta') return; // skip owner meta doc
        const data = d.data() || {};
        if (data.deleted) { if (d.id === 'default') hasDefaultTombstone = true; return; }
        list.push({ id: d.id, ...data });
      });
      const hasDefault = list.some(t => t.id === 'default');
      if (!hasDefault && !hasDefaultTombstone) {
        list.push({ id: 'default', name: '日本之旅（舊資料）', _legacy: true });
      }
      list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      setTrips(list);
      setLoading(false);
    }, () => setLoading(false));
    return () => unsub();
  }, []);

  const createTrip = async ({ name, fromCurrency, toCurrency, startDate, totalDays }) => {
    const { db, doc, setDoc } = window.__firebase;
    const id = genId();
    await setDoc(doc(db, 'trips', id), {
      name: name || '新旅程',
      fromCurrency: fromCurrency || 'JPY',
      toCurrency:   toCurrency   || 'HKD',
      startDate:    startDate    || new Date().toISOString().split('T')[0],
      totalDays:    totalDays    || 7,
      createdAt:    Date.now(),
      updatedAt:    Date.now(),
      archived:     false,
    });
    setShowNew(false);
    setRoute({ kind: 'trip', tripId: id });
  };

  const updateTripMeta = async (tripId, patch) => {
    const { db, doc, setDoc } = window.__firebase;
    await setDoc(doc(db, 'trips', tripId), { ...patch, updatedAt: Date.now() }, { merge: true });
  };

  const toggleArchive = async (trip) => {
    if (trip._legacy) return; // legacy 自動收埋
    await updateTripMeta(trip.id, { archived: !trip.archived });
  };

  // 永久刪除：delete 所有 subcollection docs。Legacy trip 就寫一個 "tombstone" doc 標記刪除。
  const deleteTripPermanent = async (trip) => {
    const { db, doc, deleteDoc, setDoc, collection, onSnapshot } = window.__firebase;
    setDeleting(true);
    try {
      const subColls = ['expenses', 'members'];
      for (const name of subColls) {
        const ref = collection(db, 'trips', trip.id, name);
        const docs = await new Promise((resolve, reject) => {
          let done = false;
          const unsub = onSnapshot(ref, (snap) => {
            if (done) return;
            done = true;
            const ids = [];
            snap.forEach(d => ids.push(d.id));
            unsub();
            resolve(ids);
          }, reject);
        });
        await Promise.all(docs.map(id => deleteDoc(doc(db, 'trips', trip.id, name, id))));
      }
      try { await deleteDoc(doc(db, 'trips', trip.id, 'meta', 'settings')); } catch (e) {}
      // Trip doc 本身：對於 legacy trip（無 doc）我哋 write 一個 tombstone；其他 trip 直接 delete
      if (trip._legacy) {
        try {
          await setDoc(doc(db, 'trips', trip.id), {
            name: trip.name || '已刪除',
            deleted: true,
            deletedAt: Date.now(),
            archived: true,
          });
        } catch (e) { console.error('tombstone fail', e); }
      } else {
        try { await deleteDoc(doc(db, 'trips', trip.id)); } catch (e) {}
      }
      localStorage.removeItem('identity:' + trip.id);
      setConfirmDelete(null);
    } catch (e) {
      alert('刪除失敗：' + (e?.message || e));
    } finally {
      setDeleting(false);
    }
  };

  const handleShare = async (trip) => {
    const r = await shareTrip(trip.id, trip.name);
    if (r.method === 'share') setShareToast('已分享 ✓');
    else if (r.method === 'clipboard') setShareToast('連結已複製 ✓');
    else if (r.method === 'fail') setShareToast('複製失敗：' + (r.url || ''));
    if (r.method !== 'cancelled') setTimeout(() => setShareToast(''), 2400);
  };

  // 分組：過往 vs 進行中/未來
  const today = new Date(); today.setHours(0,0,0,0);
  const isPast = (t) => {
    if (t.archived) return true;
    if (t._legacy) return true;
    if (!t.startDate) return false;
    try {
      const start = new Date(t.startDate);
      const end = new Date(start);
      end.setDate(end.getDate() + (t.totalDays || 7));
      return end < today;
    } catch (e) { return false; }
  };
  // Owner 見全部；朋友只見自己加入過嘅
  const visibleTrips = isOwner ? trips : trips.filter(t => joinedIds.includes(t.id));
  const currentTrips = visibleTrips.filter(t => !isPast(t));
  const pastTrips = visibleTrips.filter(t => isPast(t));

  const renderTripCard = (t, { inPast = false } = {}) => (
    <div key={t.id} className={`bg-zinc-950 border border-zinc-900 rounded-2xl p-4 ${t.archived ? 'opacity-70' : ''}`}>
      <button onClick={() => setRoute({ kind: 'trip', tripId: t.id })} className="w-full text-left">
        <div className="flex items-center justify-between">
          <div className="flex-1 min-w-0">
            <div className="text-white font-bold truncate">{t.name || '(未命名)'}</div>
            <div className="text-xs text-zinc-500 mt-0.5">
              {t.startDate ? t.startDate : '—'} · {t.fromCurrency || '?'} → {t.toCurrency || '?'}
              {t._legacy && <span className="ml-1 text-orange-500">[舊]</span>}
              {t.archived && <span className="ml-1 text-zinc-600">已封存</span>}
            </div>
          </div>
          <IconChevron className="w-4 h-4 text-zinc-600 flex-shrink-0 ml-2" />
        </div>
      </button>
      <div className="flex gap-2 mt-3">
        {isOwner && <button onClick={() => handleShare(t)} className="flex-1 py-2 text-xs bg-zinc-900 text-zinc-300 rounded-lg">🔗 分享</button>}
        {isOwner && !t._legacy && !inPast && <button onClick={() => toggleArchive(t)} className="flex-1 py-2 text-xs bg-zinc-900 text-zinc-300 rounded-lg">📦 封存</button>}
        {isOwner && !t._legacy && inPast && t.archived && <button onClick={() => toggleArchive(t)} className="flex-1 py-2 text-xs bg-zinc-900 text-zinc-300 rounded-lg">↩️ 取消封存</button>}
        {isOwner && !t._legacy && <button onClick={() => setEditTrip(t)} className="px-3 py-2 text-xs bg-zinc-900 text-zinc-300 rounded-lg"><IconPencil className="w-3.5 h-3.5" /></button>}
        {isOwner && inPast && <button onClick={() => setConfirmDelete({ trip: t, stage: 1 })} className="px-3 py-2 text-xs bg-red-500/10 text-red-400 rounded-lg"><IconTrash className="w-3.5 h-3.5" /></button>}
        {!isOwner && <div className="flex-1 text-center text-[10px] text-zinc-600 py-2">朋友模式</div>}
      </div>
    </div>
  );

  return (
    <div className="h-screen w-full bg-black flex flex-col max-w-md mx-auto overflow-hidden">
      <div className="flex-1 overflow-y-auto">
        <div className="px-5 safe-top pt-4 pb-6 space-y-4">
          <div className="flex justify-between items-start">
            <div>
              <div className="text-xs text-zinc-500 uppercase tracking-widest mb-1">Travel Tracker {isOwner && <span className="text-orange-400">· Owner</span>}</div>
              <h1 className="text-3xl font-bold text-white">{isOwner ? '我的旅程' : '我加入嘅旅程'}</h1>
            </div>
            <div className={`flex items-center gap-1 px-2 py-1 rounded-full text-[10px] ${online ? 'bg-green-500/10 text-green-400' : 'bg-zinc-800 text-zinc-500'}`}>
              {online ? <IconWifi className="w-3 h-3" /> : <IconWifiOff className="w-3 h-3" />}
              <span>{online ? '已連線' : '離線'}</span>
            </div>
          </div>

          {isOwner && (
            <button onClick={() => setShowNew(true)} className="w-full py-4 bg-gradient-to-br from-orange-400 to-orange-600 text-white rounded-2xl font-bold shadow-lg shadow-orange-500/20 flex items-center justify-center gap-2">
              <IconPlus className="w-5 h-5" /> 新增旅程
            </button>
          )}

          {!isOwner && (
            <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-4 space-y-3">
              <div className="text-xs text-zinc-400">{!ownerHash ? '🟠 還沒有 Owner — 你可以成為 Owner' : '👋 你係朋友模式'}</div>
              <button onClick={() => setShowOwnerSetup(true)} className="w-full py-2.5 bg-zinc-900 text-orange-400 rounded-xl text-sm font-medium border border-orange-500/30">
                🔑 {!ownerHash ? '成為 Owner' : '我係 Owner，登入'}
              </button>
              {ownerHash && <div className="text-[10px] text-zinc-600">朋友只可以入經邀請連結加入嘅旅程，新增旅程同分享連結需要 Owner 權限。</div>}
            </div>
          )}

          {loading ? (
            <div className="py-8 flex justify-center"><IconLoader className="w-6 h-6 animate-spin text-orange-500" /></div>
          ) : visibleTrips.length === 0 ? (
            <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-10 text-center">
              <div className="text-4xl mb-2">{isOwner ? '✈️' : '📩'}</div>
              <div className="text-zinc-500 text-sm">{isOwner ? '還沒有旅程' : '請等 Owner 分享邀請連結俾你'}</div>
            </div>
          ) : (
            <>
              {currentTrips.length > 0 ? (
                <div className="space-y-2">
                  <div className="text-[10px] text-zinc-500 uppercase tracking-widest px-1 pt-2">進行中 / 未來（{currentTrips.length}）</div>
                  {currentTrips.map(t => renderTripCard(t))}
                </div>
              ) : isOwner ? (
                <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-6 text-center">
                  <div className="text-3xl mb-1">🗺️</div>
                  <div className="text-zinc-500 text-xs">暫時未有進行中嘅旅程</div>
                </div>
              ) : null}

              {pastTrips.length > 0 && (
                <div className="space-y-2 pt-2">
                  <button onClick={() => setShowPast(p => !p)} className="w-full flex items-center justify-between py-3 px-4 bg-zinc-950 border border-zinc-900 rounded-2xl">
                    <span className="text-sm text-zinc-400 flex items-center gap-2">📁 過往旅程 <span className="text-zinc-600">({pastTrips.length})</span></span>
                    <IconChevron className={`w-4 h-4 text-zinc-500 transition-transform ${showPast ? 'rotate-90' : ''}`} />
                  </button>
                  {showPast && <div className="space-y-2">{pastTrips.map(t => renderTripCard(t, { inPast: true }))}</div>}
                </div>
              )}
            </>
          )}

          {isOwner && (
            <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-4 text-xs text-zinc-400 space-y-1">
              <div className="text-orange-400 font-medium mb-1">💡 小貼士</div>
              <div>結束日期過咗嘅旅程會自動收埋入「過往旅程」。</div>
              <div>朋友只可以喺你分享嘅旅程裡面郁，唔可以新增 / 分享其他旅程。</div>
            </div>
          )}
        </div>
      </div>

      {shareToast && (
        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-zinc-800 text-white text-sm px-4 py-2 rounded-full z-50 shadow-lg">{shareToast}</div>
      )}

      {showOwnerSetup && <OwnerSetup ownerCtx={ownerCtx} onClose={() => setShowOwnerSetup(false)} />}
      {showNew && <TripMetaEditor onClose={() => setShowNew(false)} onSave={createTrip} />}
      {editTrip && <TripMetaEditor trip={editTrip} onClose={() => setEditTrip(null)} onSave={async (patch) => { await updateTripMeta(editTrip.id, patch); setEditTrip(null); }} />}

      {confirmDelete && (
        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-5 backdrop-blur-sm" onClick={() => !deleting && setConfirmDelete(null)}>
          <div className="bg-zinc-900 w-full max-w-sm rounded-3xl p-5 border border-red-500/30" onClick={e => e.stopPropagation()}>
            <div className="text-center mb-4">
              <div className="text-4xl mb-2">⚠️</div>
              <h3 className="text-xl font-bold text-white">永久刪除旅程</h3>
              <p className="text-sm text-zinc-400 mt-2 truncate">「{confirmDelete.trip.name}」</p>
            </div>
            {confirmDelete.stage === 1 ? (
              <>
                <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-3 text-xs text-red-300 space-y-1 mb-4">
                  <div>⚠️ 所有消費記錄會消失</div>
                  <div>⚠️ 所有旅伴資料會消失</div>
                  <div>⚠️ 所有結算紀錄會消失</div>
                  <div className="pt-1 text-red-400 font-bold">呢個動作完全冇得還原</div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setConfirmDelete(null)} className="flex-1 py-3 bg-zinc-800 text-white rounded-xl font-medium">取消</button>
                  <button onClick={() => setConfirmDelete({ ...confirmDelete, stage: 2 })} className="flex-1 py-3 bg-red-500/20 text-red-400 rounded-xl font-medium">我明白，繼續</button>
                </div>
              </>
            ) : (
              <>
                <div className="bg-red-500/20 border border-red-500/50 rounded-xl p-3 text-sm text-white text-center mb-4">

                </div>

                  <button onClick={() => setConfirmDelete(null)} disabled={deleting} className="flex-1 py-3 bg-zinc-800 text-white rounded-xl font-medium disabled:opacity-50">取消</button>

                    {deleting ? '刪除中…' : '🗑️ 確定刪除'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ========== OwnerSetup modal ==========
function OwnerSetup({ ownerCtx, onClose }) {
  const [mode, setMode] = useState(ownerCtx.ownerHash ? 'login' : 'create'); // create | login | created
  const [secret, setSecret] = useState('');
  const [generated, setGenerated] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');

  const handleCreate = async () => {
    setBusy(true); setErr('');
    try {
      const newSecret = genOwnerSecret();
      const hash = await sha256(newSecret);
      const { db, doc, setDoc } = window.__firebase;
      // 用 setDoc + merge:false 但加 condition：如果 ownerHash 已存在唔好覆蓋
      // Firestore client SDK 冇 conditional write，所以靠 onSnapshot 之前 read 嗰刻判斷
      if (ownerCtx.ownerHash) { setErr('已經有 Owner，請改用「我係 Owner，登入」'); setBusy(false); return; }
      await setDoc(doc(db, 'trips', '_meta'), { ownerHash: hash, createdAt: Date.now() });
      setLocalOwnerSecret(newSecret);
      setGenerated(newSecret);
      setMode('created');
    } catch (e) { setErr('建立失敗：' + (e?.message || e)); }
    finally { setBusy(false); }
  };

  const handleLogin = async () => {
    setBusy(true); setErr('');
    try {
      const trimmed = secret.trim();
      if (!trimmed) { setErr('請輸入 Owner Secret'); setBusy(false); return; }
      const hash = await sha256(trimmed);
      if (hash !== ownerCtx.ownerHash) { setErr('Secret 唔對'); setBusy(false); return; }
      setLocalOwnerSecret(trimmed);
      ownerCtx.setIsOwner(true);
      onClose();
    } catch (e) { setErr('登入失敗：' + (e?.message || e)); }
    finally { setBusy(false); }
  };

  const copySecret = () => {
    try { navigator.clipboard.writeText(generated); alert('已複製 Owner Secret'); } catch (e) { alert('複製失敗，請手動 copy'); }
  };

  return (
    <div className="fixed inset-0 bg-black/80 z-50 flex items-end backdrop-blur-sm" onClick={onClose}>
      <div className="bg-zinc-900 w-full rounded-t-3xl p-5 max-h-[92vh] overflow-y-auto border-t border-zinc-800 safe-bottom" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-5">
          <h2 className="text-xl font-bold text-white">🔑 Owner 設定</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center"><IconX className="w-4 h-4 text-zinc-400" /></button>
        </div>

        {mode === 'create' && (
          <div className="space-y-4">
            <div className="bg-orange-500/10 border border-orange-500/30 rounded-xl p-3 text-xs text-orange-300 space-y-1">
              <div className="font-bold">⚠️ 你會成為呢個網站嘅唯一 Owner</div>
              <div>Owner 可以新增旅程、分享連結、刪除任何嘢。</div>
              <div>第二部裝置（例如 iPhone）要登入呢個 Owner 身分需要呢個 secret。</div>
              <div>朋友冇 secret 就只係朋友模式。</div>
            </div>
            <button onClick={handleCreate} disabled={busy} className="w-full py-4 bg-gradient-to-br from-orange-400 to-orange-600 text-white font-bold rounded-2xl disabled:opacity-50">
              {busy ? '建立中…' : '建立 Owner Secret'}
            </button>
            {err && <div className="text-xs text-red-400">{err}</div>}
          </div>
        )}

        {mode === 'created' && (
          <div className="space-y-4">
            <div className="bg-green-500/10 border border-green-500/30 rounded-xl p-3 text-xs text-green-300">
              ✅ Owner 已建立！你係呢個網站嘅 Owner。
            </div>
            <DarkField label="你嘅 Owner Secret（請保存好）">
              <div className="bg-zinc-800 rounded-xl p-3 font-mono text-orange-400 text-center text-lg tracking-wider break-all">{generated}</div>
            </DarkField>
            <button onClick={copySecret} className="w-full py-3 bg-zinc-800 text-white rounded-xl text-sm">📋 複製 Secret</button>
            <div className="bg-zinc-800 rounded-xl p-3 text-xs text-zinc-400 space-y-1">
              <div className="text-orange-400 font-medium">📲 第二部裝置（例如 iPhone）</div>
              <div>1. 用 Safari 開呢個網站</div>
              <div>2. 撳「我係 Owner，登入」</div>
              <div>3. 貼上面個 secret</div>
              <div>呢個 secret 之後可以喺設定頁再睇，但建議你 copy 一份去 Notes / 1Password 留底。</div>
            </div>
            <button onClick={onClose} className="w-full py-4 bg-orange-500 text-white font-bold rounded-2xl">完成</button>
          </div>
        )}

        {mode === 'login' && (
          <div className="space-y-4">
            <p className="text-sm text-zinc-400">貼你嘅 Owner Secret 嚟登入呢部裝置。</p>
            <DarkField label="Owner Secret">
              <input value={secret} onChange={e => setSecret(e.target.value)} placeholder="chiu-xxxx-xxxx-xxxx" className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500 placeholder-zinc-500 font-mono" autoCorrect="off" autoCapitalize="off" spellCheck={false} />
            </DarkField>
            <button onClick={handleLogin} disabled={busy} className="w-full py-4 bg-gradient-to-br from-orange-400 to-orange-600 text-white font-bold rounded-2xl disabled:opacity-50">{busy ? '驗證中…' : '登入'}</button>
            {err && <div className="text-xs text-red-400">{err}</div>}
            <div className="text-[10px] text-zinc-500 text-center">忘咗 secret？喺第一部已 login 嘅裝置 → 設定 → 顯示 Owner Secret</div>
          </div>
        )}
      </div>
    </div>
  );
}

              <span className="text-xl">{fromCur?.flag}</span><span className="flex-1 text-left">{fromCur?.code} · {fromCur?.name}</span><IconChevron className="w-4 h-4 text-zinc-500" />
            </button>
          </DarkField>
          <DarkField label="結算貨幣">
            <button onClick={() => setShowPicker('to')} className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl flex items-center gap-2">
              <span className="text-xl">{toCur?.flag}</span><span className="flex-1 text-left">{toCur?.code} · {toCur?.name}</span><IconChevron className="w-4 h-4 text-zinc-500" />
            </button>
          </DarkField>
          <button onClick={handleSave} className="w-full py-4 bg-gradient-to-br from-orange-400 to-orange-600 text-white font-bold rounded-2xl shadow-lg shadow-orange-500/20">{trip ? '儲存修改' : '新增旅程'}</button>
        </div>

      {showPicker && (
        <CurrencyPicker current={showPicker === 'from' ? fromCurrency : toCurrency}

}

// ========== TripApp：一個 trip 嘅主 UI ==========
function TripApp({ tripId, online, ownerCtx, route }) {
  const [tab, setTab] = useState('home');
  const [showActivity, setShowActivity] = useState(false);
  const [showInviteModal, setShowInviteModal] = useState(false);
  const [expenses, setExpenses] = useState([]);
  const [members, setMembers] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [tripMeta, setTripMeta] = useState(null);
  const [currentRate, setCurrentRate] = useState(null);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [identityId, setIdentityId] = useState(() => localStorage.getItem('identity:' + tripId) || '');
  const [showDeleted, setShowDeleted] = useState(false);
  const [accessChecking, setAccessChecking] = useState(true);
  const [accessGranted, setAccessGranted] = useState(false);
  const [accessError, setAccessError] = useState('');

  // ========== Access control ==========
  // 規則：
  // 1. Owner → 一律 grant
  // 2. 已 join 過呢個 trip → grant
  // 3. URL 帶 valid invite token → grant + 加入 joinedTrips
  // 4. 都唔係 → block
  useEffect(() => {
    let cancel = false;
    (async () => {
      setAccessChecking(true);
      setAccessError('');
      // 等 owner state 準備好
      if (ownerCtx.ownerHash === null) return;
      if (ownerCtx.isOwner) { setAccessGranted(true); setAccessChecking(false); return; }
      const joined = getJoinedTrips();
      if (joined.includes(tripId)) { setAccessGranted(true); setAccessChecking(false); return; }
      // Check invite token
      const token = route?.invite;
      if (!token) {
        // 仲有一個 fallback：如果根本未有 owner（owner doc 唔存在），俾任何人入（migration / first time）
        if (!ownerCtx.ownerHash) { setAccessGranted(true); setAccessChecking(false); return; }
        if (!cancel) { setAccessGranted(false); setAccessError('需要邀請連結先可以入呢個旅程'); setAccessChecking(false); }
        return;
      }
      // verify token
      try {
        const { db, doc, getDoc } = window.__firebase;
        const inviteSnap = await getDoc(doc(db, 'trips', tripId, 'invites', token));
        if (!inviteSnap.exists()) { if (!cancel) { setAccessGranted(false); setAccessError('邀請連結無效或已被刪除'); setAccessChecking(false); } return; }
        const data = inviteSnap.data();
        if (data.expiresAt && data.expiresAt < Date.now()) { if (!cancel) { setAccessGranted(false); setAccessError('邀請連結已過期'); setAccessChecking(false); } return; }
        // valid — record join
        addJoinedTrip(tripId);
        // 清 URL invite param 避免 share 出去
        try { setRoute({ kind: 'trip', tripId }); } catch (e) {}
        if (!cancel) { setAccessGranted(true); setAccessChecking(false); }
      } catch (e) {
        if (!cancel) { setAccessGranted(false); setAccessError('驗證失敗：' + (e?.message || e)); setAccessChecking(false); }
      }
    })();
    return () => { cancel = true; };
  }, [tripId, ownerCtx.isOwner, ownerCtx.ownerHash, route?.invite]);

  // Firestore subscriptions
  useEffect(() => {
    if (!accessGranted) return;
    const { db, doc, collection, onSnapshot } = window.__firebase;
    const expensesRef = collection(db, 'trips', tripId, 'expenses');
    const membersRef = collection(db, 'trips', tripId, 'members');
    const settingsDocRef = doc(db, 'trips', tripId, 'meta', 'settings');
    const tripDocRef = doc(db, 'trips', tripId);

    let loaded = 0;
    const check = () => { loaded++; if (loaded >= 4) setLoading(false); };

    const u1 = onSnapshot(expensesRef, (snap) => {
      const list = [];
      snap.forEach(d => list.push({ id: d.id, ...d.data() }));
      list.sort((a, b) => (b.date || '').localeCompare(a.date || '') || (b.createdAt || 0) - (a.createdAt || 0));
      setExpenses(list);
      if (loaded < 4) check();
    }, (err) => { console.error(err); if (loaded < 4) check(); });

    const u2 = onSnapshot(membersRef, (snap) => {
      const list = [];
      snap.forEach(d => list.push({ id: d.id, ...d.data() }));
      list.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      setMembers(list);
      if (loaded < 4) check();
    }, (err) => { console.error(err); if (loaded < 4) check(); });

    const u3 = onSnapshot(settingsDocRef, (snap) => {
      if (snap.exists()) setSettings({ ...DEFAULT_SETTINGS, ...snap.data() });
      if (loaded < 4) check();
    }, (err) => { console.error(err); if (loaded < 4) check(); });

    const u4 = onSnapshot(tripDocRef, (snap) => {
      if (snap.exists()) setTripMeta({ id: tripId, ...snap.data() });
      else setTripMeta(null);
      if (loaded < 4) check();
    }, (err) => { console.error(err); if (loaded < 4) check(); });

    return () => { u1(); u2(); u3(); u4(); };
  }, [tripId]);

  // 當 trip meta 有 currency 時覆蓋 settings（trip meta 為準，設定頁舊欄位為舊兼容）
  const effectiveSettings = tripMeta ? {
    ...settings,
    tripName:     tripMeta.name       || settings.tripName,
    fromCurrency: tripMeta.fromCurrency || settings.fromCurrency,
    toCurrency:   tripMeta.toCurrency   || settings.toCurrency,
    startDate:    tripMeta.startDate    || settings.startDate,
    totalDays:    tripMeta.totalDays    || settings.totalDays,
    timezone:     tripMeta.timezone     || settings.timezone || 'Asia/Hong_Kong',
  } : settings;

  useEffect(() => {
    if (loading) return;
    refreshRate();
  }, [effectiveSettings.fromCurrency, effectiveSettings.toCurrency, loading]);

  const refreshRate = async () => {
    if (effectiveSettings.fromCurrency === effectiveSettings.toCurrency) {
      setCurrentRate({ rate: 1, timestamp: Date.now() });
      return;
    }
    setRefreshing(true);
    const r = await fetchExchangeRate(effectiveSettings.fromCurrency, effectiveSettings.toCurrency);
    if (r) setCurrentRate(r);
    setRefreshing(false);
  };

  // ========== 日結快照 catch-up ==========
  // 喺 trip timezone 計今日嘅 YYYY-MM-DD，再對比 snapshots collection
  // 由 trip startDate 開始，每日寫一個 snapshot，跳過已存在嘅
  // 注意：呢個只係前端 trigger，唔保證 atomic（多人開時可能重覆寫，但 setDoc by id 會 overwrite，無問題）
  useEffect(() => {
    if (loading || !tripMeta || !effectiveSettings.startDate) return;
    const tz = effectiveSettings.timezone;
    const fmtDateInTZ = (d) => {
      try {
        const f = new Intl.DateTimeFormat('en-CA', { timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit' });
        return f.format(d);
      } catch { return d.toISOString().split('T')[0]; }
    };
    const today = fmtDateInTZ(new Date());
    const start = effectiveSettings.startDate;
    if (today < start) return;

    let cancel = false;
    (async () => {
      try {
        const { db, doc, getDoc, setDoc, collection, onSnapshot } = window.__firebase;
        // Read existing snapshot ids 一次
        const existingIds = await new Promise((resolve, reject) => {
          let done = false;
          const unsub = onSnapshot(collection(db, 'trips', tripId, 'snapshots'), (snap) => {
            if (done) return;
            done = true;
            const ids = new Set();
            snap.forEach(d => ids.add(d.id));
            unsub();
            resolve(ids);
          }, reject);
        });

        // Build days from start to yesterday（今日未完，唔截）
        const days = [];
        let cur = new Date(start + 'T00:00:00Z');
        const stop = new Date(today + 'T00:00:00Z');
        while (cur < stop) {
          days.push(fmtDateInTZ(cur));
          cur = new Date(cur.getTime() + 24*60*60*1000);
        }
        const missing = days.filter(d => !existingIds.has(d));
        if (missing.length === 0 || cancel) return;

        // 計每日嘅 cumulative：用 expense 嘅 date <= snapshotDay 嘅 expenses
        for (const d of missing) {
          if (cancel) return;
          const upTo = expenses.filter(e => !e.deleted && e.date && e.date <= d);
          const totalAll = upTo.reduce((s, e) => s + (e.amount || 0), 0);
          const balances = calculateBalances(upTo, members);
          const memberSpent = calculateMemberSpending(upTo, members);
          await setDoc(doc(db, 'trips', tripId, 'snapshots', d), {
            date: d,
            createdAt: Date.now(),
            timezone: tz,
            totalAll,
            balances,
            memberSpent,
            expenseCount: upTo.length,
          });
        }
      } catch (e) { console.warn('snapshot catch-up failed:', e); }
    })();
    return () => { cancel = true; };
  }, [loading, tripMeta, effectiveSettings.startDate, effectiveSettings.timezone, expenses.length, members.length, tripId]);

  // ========== 身分 + 權限 ==========
  const me = members.find(m => m.id === identityId) || null;
  const myRole = me?.role || null;
  const isAdmin  = myRole === 'admin';
  const isEditor = myRole === 'admin' || myRole === 'editor';
  const isViewer = myRole === 'viewer';

  const pickIdentity = (memberId) => {
    localStorage.setItem('identity:' + tripId, memberId);
    addJoinedTrip(tripId);
    setIdentityId(memberId);
  };
  const logoutIdentity = () => {
    localStorage.removeItem('identity:' + tripId);
    setIdentityId('');
  };

  // 新增自己做旅伴（若係第一個 → 自動 Admin）
  const joinAsNewMember = async ({ name, avatar, color }) => {
    const { db, doc, setDoc, collection } = window.__firebase;
    const membersRef = collection(db, 'trips', tripId, 'members');
    const id = genId();
    const role = members.length === 0 ? 'admin' : 'editor';
    await setDoc(doc(membersRef, id), {
      name: name.trim(),
      avatar: avatar || '',
      color: color || '#FF8C00',
      role,
      createdAt: Date.now(),
    });
    pickIdentity(id);
  };

  // ========== Write actions（帶 actorId + 權限 check） ==========
  const requireEditor = () => {
    if (!isEditor) { alert('你係 Viewer，冇權限修改'); return false; }
    return true;
  };
  const requireAdmin = () => {
    if (!isAdmin) { alert('只有 Admin 可以做呢個動作'); return false; }
    return true;
  };

  const upsertExpense = async (expense) => {
    if (!requireEditor()) return;
    const { db, doc, getDoc, setDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', tripId, 'expenses');
    const id = expense.id || genId();
    // 樂觀鎖：edit 模式下，確保 server 嘅 updatedAt 同我攞落嚟嗰陣一樣
    if (expense.id && expense.updatedAt) {
      try {
        const snap = await getDoc(doc(expensesRef, id));
        if (snap.exists()) {
          const serverUpdatedAt = snap.data().updatedAt || 0;
          const updatedBy = snap.data().updatedBy;
          if (serverUpdatedAt > expense.updatedAt) {
            const editor = members.find(m => m.id === updatedBy);
            const editorName = editor ? editor.name : '某人';
            alert(`⚠️ 衝突：呢筆消費啱啱俾 ${editorName} 改咗，請 reload 後再改。`);
            return false;
          }
        }
      } catch (e) { /* 讀失敗就放生，避免 block 用戶 */ }
    }
    const data = {
      ...expense,
      deleted:   expense.deleted || false,
      createdAt: expense.createdAt || Date.now(),
      createdBy: expense.createdBy || identityId || null,
      updatedAt: Date.now(),
      updatedBy: identityId || null,
    };
    delete data.id;
    try { await setDoc(doc(expensesRef, id), data); return true; } catch (e) { alert('儲存失敗：' + e.message); return false; }
  };

  const deleteExpense = async (id) => {
    // Round 1：soft delete（保留資料，可還原）
    if (!requireEditor()) return;
    const { db, doc, setDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', tripId, 'expenses');
    const existing = expenses.find(e => e.id === id);
    if (!existing) return;
    try {
      await setDoc(doc(expensesRef, id), {
        ...existing,
        deleted: true,
        deletedAt: Date.now(),
        deletedBy: identityId || null,
        updatedAt: Date.now(),
      }, { merge: true });
    } catch (e) { alert('刪除失敗：' + e.message); }
  };

  const restoreExpense = async (id) => {
    if (!requireEditor()) return;
    const { db, doc, setDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', tripId, 'expenses');
    try {
      await setDoc(doc(expensesRef, id), {
        deleted: false, deletedAt: null, deletedBy: null,
        updatedAt: Date.now(), updatedBy: identityId || null,
      }, { merge: true });
    } catch (e) { alert('還原失敗：' + e.message); }
  };

  // 留言：改 expense.comments 但唔 touch updatedAt 以免污染活動記錄
  const addComment = async (expenseId, text) => {
    if (!identityId) { alert('請先揀身分'); return; }
    const { db, doc, setDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', tripId, 'expenses');
    const existing = expenses.find(e => e.id === expenseId);
    if (!existing) return;
    const comment = {
      id: genId(),
      authorId: identityId,
      text: text.trim(),
      createdAt: Date.now(),
    };
    const comments = [...(existing.comments || []), comment];
    try {
      await setDoc(doc(expensesRef, expenseId), { comments }, { merge: true });
    } catch (e) { alert('留言失敗：' + e.message); }
  };

  const deleteComment = async (expenseId, commentId) => {
    const { db, doc, setDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', tripId, 'expenses');
    const existing = expenses.find(e => e.id === expenseId);
    if (!existing) return;
    const target = (existing.comments || []).find(c => c.id === commentId);
    if (!target) return;
    // 只可刪自己嘅留言（除非係 admin）
    if (target.authorId !== identityId && !isAdmin) { alert('只可以刪自己嘅留言'); return; }
    const comments = (existing.comments || []).filter(c => c.id !== commentId);
    try {
      await setDoc(doc(expensesRef, expenseId), { comments }, { merge: true });
    } catch (e) { alert('刪除留言失敗：' + e.message); }
  };

  const addMultipleExpenses = async (items) => {
    if (!requireEditor()) return;
    const { db, doc, setDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', tripId, 'expenses');
    try {
      await Promise.all(items.map(item => {
        const id = genId();
        const { id: _, ...data } = item;
        return setDoc(doc(expensesRef, id), {
          ...data,
          deleted: false,
          createdAt: Date.now(),
          createdBy: identityId || null,
          updatedAt: Date.now(),
          updatedBy: identityId || null,
        });
      }));
    } catch (e) { alert('儲存失敗：' + e.message); }
  };

  const upsertMember = async (member) => {
    // 任何人可改自己（頭像、顏色、名），但 role 只有 admin 改得
    const isSelf = member.id && member.id === identityId;
    const roleChanged = member.id && members.find(m => m.id === member.id)?.role !== member.role;
    if (!isSelf && !isEditor) { alert('冇權限'); return; }
    if (roleChanged && !isAdmin) { alert('只有 Admin 可以改角色'); return; }
    if (!member.id && !isAdmin) { alert('只有 Admin 可以新增旅伴'); return; }

    const { db, doc, setDoc, collection } = window.__firebase;
    const membersRef = collection(db, 'trips', tripId, 'members');
    const id = member.id || genId();
    const data = { ...member, createdAt: member.createdAt || Date.now() };
    delete data.id;
    try { await setDoc(doc(membersRef, id), data); } catch (e) { alert(e.message); }
  };

  const deleteMember = async (id) => {
    if (!requireAdmin()) return;
    if (id === identityId) { alert('唔可以刪除自己'); return; }
    const target = members.find(m => m.id === id);
    if (target?.role === 'admin' && members.filter(m => m.role === 'admin').length <= 1) {
      alert('必須至少保留一個 Admin');
      return;
    }
    const { db, doc, deleteDoc, collection } = window.__firebase;
    const membersRef = collection(db, 'trips', tripId, 'members');
    try { await deleteDoc(doc(membersRef, id)); } catch (e) {}
  };

  const saveSettings = async (next) => {
    if (!requireEditor()) return;
    const { db, doc, setDoc } = window.__firebase;
    const ref = doc(db, 'trips', tripId, 'meta', 'settings');
    try { await setDoc(ref, next); } catch (e) {}
  };

  const saveTripMeta = async (patch) => {
    if (!requireAdmin()) return;
    const { db, doc, setDoc } = window.__firebase;
    try {
      await setDoc(doc(db, 'trips', tripId), { ...patch, updatedAt: Date.now() }, { merge: true });
    } catch (e) { alert('更新失敗：' + e.message); }
  };

  if (accessChecking) {
    return (
      <div className="h-screen w-full flex items-center justify-center bg-black">
        <div className="flex flex-col items-center gap-3">
          <IconLoader className="w-8 h-8 animate-spin text-orange-500" />
          <div className="text-zinc-500 text-xs">驗證權限中...</div>
        </div>
      </div>
    );
  }

  if (!accessGranted) {
    return (
      <div className="h-screen w-full flex flex-col items-center justify-center bg-black p-6 text-center max-w-md mx-auto">
        <div className="text-5xl mb-4">🔒</div>
        <h2 className="text-xl font-bold text-white mb-2">無法進入呢個旅程</h2>
        <p className="text-sm text-zinc-400 mb-6">{accessError || '需要邀請連結'}</p>
        <button onClick={() => setRoute({ kind: 'list' })} className="px-6 py-3 bg-orange-500 text-white rounded-xl font-medium">返主頁</button>
      </div>
    );
  }

  if (loading) {
    return (
      <div className="h-screen w-full flex items-center justify-center bg-black">
        <div className="flex flex-col items-center gap-3">
          <IconLoader className="w-8 h-8 animate-spin text-orange-500" />
          <div className="text-zinc-500 text-xs">載入旅程中...</div>
        </div>
      </div>
    );
  }

  // Identity gate：未選身分 → 彈揀人
  if (!me) {
    return <IdentityGate tripId={tripId} tripMeta={tripMeta} members={members} onPick={pickIdentity} onJoin={joinAsNewMember} />;
  }

  // 可視 expenses（排除 deleted，除非明確顯示）
  const visibleExpenses = showDeleted ? expenses : expenses.filter(e => !e.deleted);

  const ctx = {
    tripId, tripMeta,
    expenses: visibleExpenses,
    allExpenses: expenses,
    members,
    settings: effectiveSettings,
    currentRate, refreshing, online,
    me, myRole, isAdmin, isEditor, isViewer,
    isOwner: ownerCtx.isOwner,
    ownerCtx,
    showDeleted, setShowDeleted,
    upsertExpense, deleteExpense, restoreExpense, addMultipleExpenses,
    addComment, deleteComment,
    upsertMember, deleteMember, saveSettings, saveTripMeta,
    refreshRate, logoutIdentity,
    openActivity: () => setShowActivity(true),
    openInvite: () => setShowInviteModal(true),
  };

  return (
    <div className="h-screen w-full bg-black flex flex-col max-w-md mx-auto relative overflow-hidden">
      <div className="flex-1 overflow-y-auto pb-36">
        {tab === 'home' && <HomeTab {...ctx} setTab={setTab} />}
        {tab === 'records' && <RecordsTab {...ctx} />}
        {tab === 'scan' && <ScanTab {...ctx} onDone={() => setTab('records')} />}
        {tab === 'stats' && <StatsTab {...ctx} />}
        {tab === 'settings' && <SettingsTab {...ctx} />}
      </div>
      <BottomNav tab={tab} setTab={setTab} />
      {showActivity && <ActivityLog allExpenses={expenses} members={members} settings={effectiveSettings} onClose={() => setShowActivity(false)} />}
      {showInviteModal && <InviteManager tripId={tripId} tripName={effectiveSettings.tripName} onClose={() => setShowInviteModal(false)} isOwner={ownerCtx.isOwner} />}
    </div>
  );
}

// ========== IdentityGate ==========
function IdentityGate({ tripId, tripMeta, members, onPick, onJoin }) {
  const [mode, setMode] = useState(members.length === 0 ? 'join' : 'pick'); // pick | join
  const [name, setName] = useState('');
  const [avatar, setAvatar] = useState('');
  const [color, setColor] = useState(PRESET_COLORS[0]);
  const fileRef = useRef(null);

  const usedColors = new Set(members.map(m => m.color).filter(Boolean));

  const handleAvatar = (file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 240;
        const size = Math.min(img.width, img.height);
        const sx = (img.width - size) / 2;
        const sy = (img.height - size) / 2;
        canvas.width = max; canvas.height = max;
        canvas.getContext('2d').drawImage(img, sx, sy, size, size, 0, 0, max, max);
        setAvatar(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = r.result;
    };
    r.readAsDataURL(file);
  };

  const handleJoin = () => {
    if (!name.trim()) { alert('請輸入名字'); return; }
    onJoin({ name, avatar, color });
  };

  const isFirst = members.length === 0;

  return (
    <div className="h-screen w-full bg-black flex flex-col max-w-md mx-auto overflow-hidden">
      <div className="flex-1 overflow-y-auto">
        <div className="px-5 safe-top pt-4 pb-6 space-y-5">
          <button onClick={() => setRoute({ kind: 'list' })} className="text-zinc-500 text-xs flex items-center gap-1">
            <IconChevron className="w-3 h-3 rotate-180" /> 返回旅程列表
          </button>
          <div>
            <div className="text-xs text-zinc-500 uppercase tracking-widest mb-1">歡迎加入</div>
            <h1 className="text-3xl font-bold text-white">{tripMeta?.name || '旅程'}</h1>
            <p className="text-sm text-zinc-500 mt-2">{isFirst ? '你係第一個加入嘅人，會自動成為 Admin' : '請揀你係邊個'}</p>
          </div>

          {!isFirst && (
            <div className="bg-zinc-950 border border-zinc-900 rounded-xl p-1 flex">
              <button onClick={() => setMode('pick')} className={`flex-1 py-2 rounded-lg text-sm ${mode === 'pick' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-500'}`}>我係現有旅伴</button>
              <button onClick={() => setMode('join')} className={`flex-1 py-2 rounded-lg text-sm ${mode === 'join' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-500'}`}>我係新人</button>
            </div>
          )}

          {mode === 'pick' && !isFirst && (
            <div className="space-y-2">
              {members.map(m => (
                <button key={m.id} onClick={() => onPick(m.id)} className="w-full flex items-center gap-3 p-3 bg-zinc-950 border border-zinc-900 rounded-2xl hover:bg-zinc-900">
                  <MemberAvatar member={m} size={44} />
                  <div className="flex-1 text-left">
                    <div className="text-white font-medium" style={{ color: ensureReadableColor(m.color) }}>{m.name}</div>
                    <div className="text-[10px] text-zinc-500">{ROLES[m.role || 'editor']?.name || '—'}</div>
                  </div>
                  <IconChevron className="w-4 h-4 text-zinc-600" />
                </button>
              ))}
            </div>
          )}

          {mode === 'join' && (
            <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-5 space-y-4">
              <div className="flex justify-center">
                <button onClick={() => fileRef.current?.click()} className="relative">
                  {avatar ? (
                    <img src={avatar} className="w-24 h-24 rounded-full object-cover ring-4 ring-zinc-800" alt="" />
                  ) : (
                    <div className="w-24 h-24 rounded-full flex items-center justify-center text-4xl font-bold text-white ring-4 ring-zinc-800" style={{ backgroundColor: color }}>{name[0] || '?'}</div>
                  )}
                  <div className="absolute bottom-0 right-0 w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center shadow-lg"><IconCamera className="w-4 h-4 text-white" /></div>
                </button>
                <input ref={fileRef} type="file" accept="image/*" onChange={e => handleAvatar(e.target.files?.[0])} className="hidden" />
              </div>
              <DarkField label="你嘅名字"><input value={name} onChange={e => setName(e.target.value)} placeholder="例如：Ricky" className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500" /></DarkField>
              <DarkField label="顏色">
                <div className="flex gap-2 flex-wrap">
                  {PRESET_COLORS.map(c => {
                    const used = usedColors.has(c);
                    return (
                      <button key={c} onClick={() => setColor(c)} className={`relative w-9 h-9 rounded-full ${color === c ? 'ring-2 ring-white scale-110' : ''} ${used && color !== c ? 'opacity-40' : ''}`} style={{ backgroundColor: c }}>
                        {used && color !== c && <span className="absolute -top-0.5 -right-0.5 text-[8px] bg-zinc-800 text-zinc-400 rounded-full px-1">已用</span>}
                      </button>
                    );
                  })}
                </div>
                {[...usedColors].includes(color) && <p className="text-[10px] text-orange-400 mt-1">呢個顏色已有人用，建議揀第個</p>}
              </DarkField>
              <button onClick={handleJoin} className="w-full py-4 bg-gradient-to-br from-orange-400 to-orange-600 text-white font-bold rounded-2xl shadow-lg shadow-orange-500/20">
                {isFirst ? '成為 Admin 並進入' : '加入旅程'}
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function InviteManager({ tripId, tripName, onClose, isOwner }) {
  const [invites, setInvites] = useState([]);
  const [loading, setLoading] = useState(true);
  const [creating, setCreating] = useState(false);
  const [chosenExpiry, setChosenExpiry] = useState('24h');
  const [toast, setToast] = useState('');

  useEffect(() => {
    const { db, collection, onSnapshot } = window.__firebase;
    const unsub = onSnapshot(collection(db, 'trips', tripId, 'invites'), (snap) => {
      const list = [];
      snap.forEach(d => list.push({ id: d.id, ...d.data() }));
      list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
      setInvites(list);
      setLoading(false);
    }, () => setLoading(false));
    return () => unsub();
  }, [tripId]);

  const computeExpires = (key) => {
    const now = Date.now();
    if (key === '1h') return now + 60*60*1000;
    if (key === '24h') return now + 24*60*60*1000;
    if (key === '7d') return now + 7*24*60*60*1000;
    return null; // 永久
  };

  const handleCreate = async () => {
    if (!isOwner) { alert('只有 Owner 可以建邀請'); return; }
    setCreating(true);
    try {
      const token = genId() + genId().slice(0, 6);
      const { db, doc, setDoc } = window.__firebase;
      await setDoc(doc(db, 'trips', tripId, 'invites', token), {
        createdAt: Date.now(),
        expiresAt: computeExpires(chosenExpiry),
        expiryKey: chosenExpiry,
      });
    } catch (e) { alert('建立失敗：' + (e?.message || e)); }
    finally { setCreating(false); }
  };

  const handleDelete = async (token) => {
    if (!confirm('刪除呢個邀請連結？已用過嘅人唔受影響，但連結會即刻失效')) return;
    const { db, doc, deleteDoc } = window.__firebase;
    try { await deleteDoc(doc(db, 'trips', tripId, 'invites', token)); } catch (e) {}
  };

  const buildUrl = (token) => `${window.location.origin}${window.location.pathname}#/trip/${tripId}?invite=${token}`;
  const qrUrl = (url) => `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(url)}&bgcolor=18-18-18&color=ffffff`;

  const handleCopy = async (token) => {
    try { await navigator.clipboard.writeText(buildUrl(token)); setToast('連結已複製 ✓'); setTimeout(() => setToast(''), 2000); }
    catch (e) { alert('複製失敗'); }
  };

  const handleShareInvite = async (token) => {
    const url = buildUrl(token);
    try {
      if (navigator.share) await navigator.share({ title: tripName || '旅程邀請', text: '一齊記帳：' + (tripName || ''), url });
      else { await navigator.clipboard.writeText(url); setToast('連結已複製 ✓'); setTimeout(() => setToast(''), 2000); }
    } catch (e) {}
  };

  const fmtTime = (ts) => {
    if (!ts) return '永久';
    const d = new Date(ts);
    const now = new Date();
    const diff = ts - now;
    if (diff < 0) return '已過期';
    return d.toLocaleString('zh-HK', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  };

  return (
    <div className="fixed inset-0 bg-black z-50 flex flex-col max-w-md mx-auto">
      <div className="safe-top px-5 pt-4 pb-3 border-b border-zinc-900 flex items-center justify-between">
        <h2 className="text-xl font-bold text-white">📲 邀請連結</h2>
        <button onClick={onClose} className="w-9 h-9 rounded-full bg-zinc-900 flex items-center justify-center"><IconX className="w-4 h-4 text-zinc-400" /></button>
      </div>
      <div className="flex-1 overflow-y-auto px-5 py-3 safe-bottom space-y-4">
        {isOwner && (
          <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-4 space-y-3">
            <DarkField label="有效期">
              <div className="grid grid-cols-4 gap-2">
                {[
                  { k: '1h', l: '1 小時' },
                  { k: '24h', l: '24 小時' },
                  { k: '7d', l: '7 日' },
                  { k: 'never', l: '永久' },
                ].map(o => (
                  <button key={o.k} onClick={() => setChosenExpiry(o.k)} className={`py-2 rounded-lg text-xs ${chosenExpiry === o.k ? 'bg-orange-500 text-white font-medium' : 'bg-zinc-800 text-zinc-400'}`}>{o.l}</button>
                ))}
              </div>
            </DarkField>
            <button onClick={handleCreate} disabled={creating} className="w-full py-3 bg-gradient-to-br from-orange-400 to-orange-600 text-white rounded-xl font-medium disabled:opacity-50">
              {creating ? '生成中…' : '＋ 生成邀請連結'}
            </button>
          </div>
        )}

        {loading ? <div className="text-center py-6"><IconLoader className="w-5 h-5 animate-spin inline text-orange-500" /></div>
          : invites.length === 0 ? <div className="text-center py-8 text-zinc-500 text-sm">{isOwner ? '未有邀請連結' : '⚠️ 只有 Owner 可以建邀請連結'}</div>
          : (
            <div className="space-y-3">
              {invites.map(inv => {
                const expired = inv.expiresAt && inv.expiresAt < Date.now();
                const url = buildUrl(inv.id);
                return (
                  <div key={inv.id} className={`bg-zinc-950 border rounded-2xl p-4 space-y-3 ${expired ? 'border-red-500/30 opacity-60' : 'border-zinc-900'}`}>
                    <div className="flex items-center justify-between">
                      <div>
                        <div className="text-xs text-zinc-500">建立 {new Date(inv.createdAt || 0).toLocaleString('zh-HK', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' })}</div>
                        <div className={`text-sm font-medium ${expired ? 'text-red-400' : 'text-orange-400'}`}>{expired ? '已過期' : `有效到 ${fmtTime(inv.expiresAt)}`}</div>
                      </div>
                      {isOwner && <button onClick={() => handleDelete(inv.id)} className="text-zinc-500 p-1.5"><IconTrash className="w-4 h-4" /></button>}
                    </div>
                    {!expired && (
                      <>
                        <div className="bg-white rounded-xl p-2 flex justify-center">
                          <img src={qrUrl(url)} alt="QR" className="w-44 h-44" />
                        </div>
                        <div className="text-[10px] text-zinc-500 break-all bg-zinc-900 rounded p-2">{url}</div>
                        <div className="flex gap-2">
                          <button onClick={() => handleCopy(inv.id)} className="flex-1 py-2 bg-zinc-800 text-white rounded-lg text-xs">📋 複製</button>
                          <button onClick={() => handleShareInvite(inv.id)} className="flex-1 py-2 bg-orange-500 text-white rounded-lg text-xs">📤 分享</button>
                        </div>
                      </>
                    )}
                  </div>
                );
              })}
            </div>
          )}
      </div>
      {toast && <div className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-zinc-800 text-white text-sm px-4 py-2 rounded-full shadow-lg">{toast}</div>}
    </div>
  );
}

function ActivityLog({ allExpenses, members, settings, onClose }) {
  // Build event list from expenses (create/update/delete/restore inferred from timestamps)
  const events = [];
  (allExpenses || []).forEach(exp => {
    // create
    if (exp.createdAt) {
      events.push({
        ts: exp.createdAt,
        actorId: exp.createdBy || null,
        kind: 'create',
        exp,
      });
    }
    // delete (if currently deleted)
    if (exp.deleted && exp.deletedAt) {
      events.push({
        ts: exp.deletedAt,
        actorId: exp.deletedBy || null,
        kind: 'delete',
        exp,
      });
    }
    // update: 若 updatedAt > createdAt 而且唔係剛剛 created（差距 > 2s）
    if (exp.updatedAt && exp.createdAt && exp.updatedAt - exp.createdAt > 2000) {
      // 避免同 delete event 重覆
      if (!exp.deleted || (exp.deletedAt && Math.abs(exp.updatedAt - exp.deletedAt) > 2000)) {
        events.push({
          ts: exp.updatedAt,
          actorId: exp.updatedBy || null,
          kind: exp.deleted ? 'restore-or-edit' : 'update',
          exp,
        });
      }
    }
  });
  events.sort((a, b) => b.ts - a.ts);

  const KIND_LABEL = {
    create: { label: '新增', emoji: '➕', color: 'text-green-400' },
    update: { label: '修改', emoji: '✏️', color: 'text-blue-400' },
    delete: { label: '刪除', emoji: '🗑️', color: 'text-red-400' },
    'restore-or-edit': { label: '修改', emoji: '✏️', color: 'text-blue-400' },
  };

  const fmtTime = (ts) => {
    const d = new Date(ts);
    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  };

  return (
    <div className="fixed inset-0 bg-black z-50 flex flex-col max-w-md mx-auto">
      <div className="safe-top px-5 pt-4 pb-3 border-b border-zinc-900 flex items-center justify-between">
        <div>
          <h2 className="text-xl font-bold text-white">📜 活動記錄</h2>
          <div className="text-[11px] text-zinc-500">共 {events.length} 條</div>
        </div>
        <button onClick={onClose} className="w-9 h-9 rounded-full bg-zinc-900 flex items-center justify-center"><IconX className="w-4 h-4 text-zinc-400" /></button>
      </div>
      <div className="flex-1 overflow-y-auto px-5 py-3 safe-bottom">
        {events.length === 0 ? (
          <div className="text-center py-12 text-zinc-500 text-sm">冇活動記錄</div>
        ) : (
          <div className="space-y-2">
            {events.map((ev, idx) => {
              const actor = members.find(m => m.id === ev.actorId);
              const label = KIND_LABEL[ev.kind];
              const cat = CATEGORIES.find(c => c.id === ev.exp.category);
              return (
                <div key={idx} className="bg-zinc-950 border border-zinc-900 rounded-2xl p-3">
                  <div className="flex items-start gap-2">
                    <span className="text-lg flex-shrink-0">{label?.emoji || '•'}</span>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-1 flex-wrap">
                        {actor ? (
                          <span className="text-sm font-medium" style={{ color: ensureReadableColor(actor.color) }}>{actor.name}</span>
                        ) : (
                          <span className="text-sm text-zinc-500">系統</span>
                        )}
                        <span className={`text-xs ${label?.color || 'text-zinc-400'}`}>{label?.label}</span>
                        <span className="text-xs text-zinc-500">·</span>
                        <span className="text-[10px]">{cat?.emoji}</span>
                        <span className="text-xs text-white truncate">{ev.exp.name}</span>
                      </div>
                      <div className="text-[10px] text-zinc-500 mt-0.5">
                        {formatMoney(ev.exp.amount, settings.fromCurrency)} · {fmtTime(ev.ts)}
                        {ev.exp.deleted && ev.kind !== 'delete' && <span className="text-red-400 ml-1">（呢筆而家已刪除）</span>}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ========== ExpenseCard ==========
function ExpenseCard({ expense, members, settings, currentRate, onClick }) {
  const cat = CATEGORIES.find(c => c.id === expense.category);
  const paidBy = members.find(m => m.id === expense.paidBy);
  const splitMembers = (expense.splitAmong || []).map(id => members.find(m => m.id === id)).filter(Boolean);
  const isDeleted = !!expense.deleted;
  const isPersonal = expense.txType === 'personal';
  const isManual = expense.splitMode === 'manual';
  return (
    <button onClick={onClick} className={`w-full bg-zinc-950 border rounded-2xl p-3 flex items-center gap-3 text-left ${isDeleted ? 'opacity-40' : ''} ${isPersonal ? 'border-zinc-800' : 'border-zinc-900'}`}>
      <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style={{ backgroundColor: cat?.color + '20' }}>{cat?.emoji}</div>
      <div className="flex-1 min-w-0">
        <div className={`text-white font-medium truncate text-sm flex items-center gap-1.5 ${isDeleted ? 'line-through' : ''}`}>
          <span className="truncate">{expense.name}</span>
          {isPersonal && <span className="text-[9px] bg-zinc-800 text-zinc-400 px-1.5 py-0.5 rounded flex-shrink-0">個人</span>}
          {isDeleted && <span className="text-[10px] text-zinc-500 no-underline">（已刪除）</span>}
        </div>
        <div className="flex items-center gap-1.5 mt-0.5">
          {paidBy && <><MemberAvatar member={paidBy} size={16} /><span className="text-xs truncate" style={{ color: ensureReadableColor(paidBy.color) }}>{paidBy.name}</span></>}
          {!isPersonal && splitMembers.length > 0 && splitMembers.length !== members.length && (<><span className="text-xs text-zinc-600">·</span><span className="text-xs text-zinc-500">分 {splitMembers.length} 人{isManual && '（手動）'}</span></>)}
          {!isPersonal && isManual && splitMembers.length === members.length && (<><span className="text-xs text-zinc-600">·</span><span className="text-xs text-zinc-500">手動分</span></>)}
          {expense.location && (<><span className="text-xs text-zinc-600">·</span><span className="text-xs text-zinc-500 truncate">{expense.location}</span></>)}
          {expense.comments && expense.comments.length > 0 && (<><span className="text-xs text-zinc-600">·</span><span className="text-xs text-zinc-500">💬 {expense.comments.length}</span></>)}
        </div>
      </div>
      <div className="text-right flex-shrink-0">
        <div className={`text-white font-bold ${isDeleted ? 'line-through' : ''}`}>{formatMoney(expense.amount, settings.fromCurrency)}</div>
        <div className="text-[10px] text-zinc-500">{formatMoney(convert(expense.amount, currentRate), settings.toCurrency)}</div>
      </div>
    </button>
  );
}
