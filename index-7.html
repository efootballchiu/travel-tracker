// ========== RecordsTab ==========
function RecordsTab({ expenses, allExpenses, upsertExpense, deleteExpense, restoreExpense, addComment, deleteComment, members, settings, currentRate, isEditor, isAdmin, me, showDeleted, setShowDeleted }) {
  const [view, setView] = useState('date');
  const [showAdd, setShowAdd] = useState(false);
  const [editExpenseId, setEditExpenseId] = useState(null);
  // 每次 render 都重新 look up，確保 editor 見到最新 comments
  const editExpense = editExpenseId ? expenses.find(e => e.id === editExpenseId) || (allExpenses || []).find(e => e.id === editExpenseId) : null;
  const aliveTotal = expenses.filter(e => !e.deleted).reduce((s, e) => s + e.amount, 0);
  const deletedCount = (allExpenses || []).filter(e => e.deleted).length;

  const grouped = {};
  expenses.forEach(e => { if (!grouped[e.date]) grouped[e.date] = []; grouped[e.date].push(e); });
  const sortedDates = Object.keys(grouped).sort().reverse();

  const byCategory = {};
  expenses.forEach(e => {
    if (e.deleted) return;
    if (!byCategory[e.category]) byCategory[e.category] = { items: [], total: 0 };
    byCategory[e.category].items.push(e);
    byCategory[e.category].total += e.amount;
  });

  const handleEditorDelete = (id) => {
    if (confirm('刪除呢筆消費？\n（會放入「已刪除」，可以還原）')) deleteExpense(id);
  };

  return (
    <div className="px-5 safe-top pt-4 pb-4 space-y-4">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-3xl font-bold text-white">所有消費</h1>
          <p className="text-xs text-zinc-500 mt-1">{expenses.filter(e => !e.deleted).length} 筆 · {formatMoney(aliveTotal, settings.fromCurrency)} · ≈ {formatMoney(convert(aliveTotal, currentRate), settings.toCurrency)}</p>
        </div>
        {isEditor && (
          <button onClick={() => setShowAdd(true)} className="w-11 h-11 bg-gradient-to-br from-orange-400 to-orange-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-orange-500/20"><IconPlus className="w-5 h-5" /></button>
        )}
      </div>

      <div className="bg-zinc-950 border border-zinc-900 rounded-xl p-1 flex">
        <button onClick={() => setView('date')} className={`flex-1 py-2 rounded-lg text-sm ${view === 'date' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-500'}`}>按日期</button>
        <button onClick={() => setView('category')} className={`flex-1 py-2 rounded-lg text-sm ${view === 'category' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-500'}`}>按類別</button>
      </div>

      {deletedCount > 0 && (
        <button onClick={() => setShowDeleted && setShowDeleted(!showDeleted)} className="w-full py-2 text-xs text-zinc-400 bg-zinc-950 border border-zinc-900 rounded-xl flex items-center justify-center gap-2">
          <IconTrash className="w-3.5 h-3.5" />
          {showDeleted ? '隱藏已刪除' : `顯示已刪除（${deletedCount} 筆）`}
        </button>
      )}

      {expenses.length === 0 && (
        <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-8 text-center">
          <div className="text-4xl mb-2">📝</div>
          <div className="text-zinc-500 text-sm mb-3">還沒有任何記錄</div>
          {isEditor && <button onClick={() => setShowAdd(true)} className="text-orange-500 font-medium text-sm">+ 新增一筆</button>}
        </div>
      )}

      {view === 'date' && sortedDates.map(date => {
        const items = grouped[date];
        const dayTotal = items.filter(e => !e.deleted).reduce((s, e) => s + e.amount, 0);
        const dObj = new Date(date);
        const dow = ['日','一','二','三','四','五','六'][dObj.getDay()];
        return (
          <div key={date} className="space-y-2">
            <div className="flex justify-between items-baseline px-1">
              <div className="text-sm font-medium text-zinc-300">{date}（{dow}）</div>
              <div className="text-xs text-zinc-500">{formatMoney(dayTotal, settings.fromCurrency)}</div>
            </div>
            {items.map(e => (
              <div key={e.id} className="space-y-1">
                <ExpenseCard expense={e} members={members} settings={settings} currentRate={currentRate} onClick={() => isEditor && setEditExpenseId(e.id)} />
                {e.deleted && isEditor && (
                  <button onClick={() => restoreExpense(e.id)} className="w-full py-1.5 text-[11px] text-orange-400 bg-orange-500/10 rounded-lg flex items-center justify-center gap-1">
                    <IconRefresh className="w-3 h-3" /> 還原
                  </button>
                )}
              </div>
            ))}
          </div>
        );
      })}

      {view === 'category' && Object.keys(byCategory).map(catId => {
        const cat = CATEGORIES.find(c => c.id === catId);
        const { items, total: catTotal } = byCategory[catId];
        return (
          <div key={catId} className="space-y-2">
            <div className="flex justify-between items-baseline px-1">
              <div className="text-sm font-medium flex items-center gap-2" style={{ color: cat?.color }}><span>{cat?.emoji}</span> {cat?.name}</div>
              <div className="text-xs text-zinc-500">{formatMoney(catTotal, settings.fromCurrency)}</div>
            </div>
            {items.map(e => <ExpenseCard key={e.id} expense={e} members={members} settings={settings} currentRate={currentRate} onClick={() => isEditor && setEditExpenseId(e.id)} />)}
          </div>
        );
      })}

      {(showAdd || editExpense) && (
        <ExpenseEditor
          expense={editExpense}
          members={members}
          settings={settings}
          me={me}
          isAdmin={isAdmin}
          addComment={addComment}
          deleteComment={deleteComment}
          onDelete={editExpense ? () => { handleEditorDelete(editExpense.id); setEditExpenseId(null); } : null}
          onClose={() => { setShowAdd(false); setEditExpenseId(null); }}
          onSave={(data) => {
            if (editExpense) upsertExpense({ ...editExpense, ...data });
            else upsertExpense(data);
            setShowAdd(false); setEditExpenseId(null);
          }}
        />
      )}
    </div>
  );
}

// ========== ExpenseEditor ==========
function DarkField({ label, children }) {
  return <div className="space-y-2"><label className="block text-xs text-zinc-500 uppercase tracking-wider">{label}</label>{children}</div>;
}

function ExpenseEditor({ expense, members, settings, onClose, onSave, onDelete, addComment, deleteComment, me, isAdmin }) {
  const [name, setName] = useState(expense?.name || '');
  const [amount, setAmount] = useState(expense?.amount?.toString() || '');
  const [category, setCategory] = useState(expense?.category || 'food');
  const [paymentMethod, setPaymentMethod] = useState(expense?.paymentMethod || 'cash');
  const [paidBy, setPaidBy] = useState(expense?.paidBy || members[0]?.id || '');
  const [txType, setTxType] = useState(expense?.txType || 'shared');
  const [splitMode, setSplitMode] = useState(expense?.splitMode || 'even');
  const [splitAmong, setSplitAmong] = useState(expense?.splitAmong || members.map(m => m.id));
  const [splitAmounts, setSplitAmounts] = useState(() => {
    const init = {};
    members.forEach(m => init[m.id] = '');
    if (expense?.splitAmounts) Object.entries(expense.splitAmounts).forEach(([k, v]) => init[k] = String(v));
    return init;
  });
  const [location, setLocation] = useState(expense?.location || '');
  const [notes, setNotes] = useState(expense?.notes || '');
  const [datetime, setDatetime] = useState(() => {
    if (expense?.datetime) return expense.datetime;
    const base = expense?.date || new Date().toISOString().split('T')[0];
    const t = expense?.time || '12:00';
    if (expense?.date) return `${base}T${t}`;
    const now = new Date();
    const pad = n => n.toString().padStart(2,'0');
    return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  });
  const [newComment, setNewComment] = useState('');

  const comments = expense?.comments || [];

  // 個人消費 → force 付款人自分自擔
  useEffect(() => {
    if (txType === 'personal' && paidBy) {
      setSplitAmong([paidBy]);
      setSplitMode('even');
    }
  }, [txType, paidBy]);

  const toggleSplit = (id) => {
    if (txType === 'personal') return;
    setSplitAmong(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  };

  const amt = parseFloat(amount) || 0;
  // 混合分帳：有輸入嘅人 = 自己嗰個數；未輸入 = 平均分剩返
  const fixedIds = splitAmong.filter(id => {
    const v = splitAmounts[id];
    return v !== '' && v !== undefined && v !== null && !isNaN(parseFloat(v));
  });
  const freeIds = splitAmong.filter(id => !fixedIds.includes(id));
  const fixedSum = fixedIds.reduce((s, id) => s + (parseFloat(splitAmounts[id]) || 0), 0);
  const remainder = amt - fixedSum;
  const freeShare = freeIds.length > 0 ? remainder / freeIds.length : 0;
  const computedShare = (id) => fixedIds.includes(id) ? (parseFloat(splitAmounts[id]) || 0) : freeShare;
  const manualOverBudget = fixedSum > amt + 0.01;
  const manualAllFixed = freeIds.length === 0 && Math.abs(fixedSum - amt) > 0.01;

  const handleSave = () => {
    if (!name || !amount) { alert('請填寫名稱同金額'); return; }
    if (members.length > 0 && splitAmong.length === 0) { alert('請揀至少一個分擔者'); return; }
    if (txType === 'shared' && splitMode === 'manual') {
      if (manualOverBudget) { alert(`固定金額加起來 ${formatMoney(fixedSum, settings.fromCurrency)} 已經超過總額 ${formatMoney(amt, settings.fromCurrency)}`); return; }
      if (manualAllFixed) { alert(`大家全部都自己輸入咗金額，但加總同總額唔等（${formatMoney(fixedSum, settings.fromCurrency)} vs ${formatMoney(amt, settings.fromCurrency)}）`); return; }
    }
    const [d, t] = datetime.split('T');
    // 計算最終每人分擔（shared + manual：fixed 原值，free 均分 remainder）
    const finalAmounts = (txType === 'shared' && splitMode === 'manual')
      ? Object.fromEntries(splitAmong.map(id => [id, computedShare(id)]))
      : null;
    onSave({
      name, amount: amt, category, paymentMethod, paidBy,
      txType,
      splitMode: txType === 'personal' ? 'even' : splitMode,
      splitAmong,
      splitAmounts: finalAmounts,
      location, notes,
      date: d, time: t || '12:00', datetime,
    });
  };

  return (
    <div className="fixed inset-0 bg-black/80 z-50 flex items-end backdrop-blur-sm" onClick={onClose}>
      <div className="bg-zinc-900 w-full rounded-t-3xl p-5 max-h-[92vh] overflow-y-auto border-t border-zinc-800 safe-bottom" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-5">
          <h2 className="text-xl font-bold text-white">{expense ? '編輯消費' : '新增消費'}</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center"><IconX className="w-4 h-4 text-zinc-400" /></button>
        </div>
        <div className="space-y-4">
          <DarkField label="名稱"><input value={name} onChange={e => setName(e.target.value)} placeholder="例如：咖啡、麵包" className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500 placeholder-zinc-500" /></DarkField>
          <DarkField label={`金額（${settings.fromCurrency}）`}>
            <div className="relative">
              <span className="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-xl">{getCurrencySymbol(settings.fromCurrency)}</span>
              <input type="number" inputMode="decimal" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0" className="w-full pl-12 pr-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500 text-2xl font-bold placeholder-zinc-600" />
            </div>
          </DarkField>

          <DarkField label="交易類型">
            <div className="bg-zinc-800 rounded-xl p-1 flex">
              <button onClick={() => setTxType('shared')} className={`flex-1 py-2 rounded-lg text-sm ${txType === 'shared' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-400'}`}>👥 共同分帳</button>
              <button onClick={() => setTxType('personal')} className={`flex-1 py-2 rounded-lg text-sm ${txType === 'personal' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-400'}`}>👤 個人消費</button>
            </div>
            {txType === 'personal' && <p className="text-[10px] text-zinc-500 mt-1">個人消費完全唔入結算，只係紀錄</p>}
          </DarkField>

          <DarkField label="類別">
            <div className="grid grid-cols-4 gap-2">
              {CATEGORIES.map(c => (
                <button key={c.id} onClick={() => setCategory(c.id)} className={`py-3 rounded-xl flex flex-col items-center gap-0.5 ${category === c.id ? 'text-white' : 'bg-zinc-800 text-zinc-400'}`} style={category === c.id ? { backgroundColor: c.color } : {}}>
                  <span className="text-lg">{c.emoji}</span><span className="text-[10px]">{c.name}</span>
                </button>
              ))}
            </div>
          </DarkField>
          <DarkField label="支付方式">
            <div className="grid grid-cols-4 gap-2">
              {PAYMENT_METHODS.map(p => (
                <button key={p.id} onClick={() => setPaymentMethod(p.id)} className={`py-2.5 rounded-xl text-sm ${paymentMethod === p.id ? 'bg-orange-500 text-white font-medium' : 'bg-zinc-800 text-zinc-400'}`}>{p.name}</button>
              ))}
            </div>
          </DarkField>

          {members.length > 0 && (
            <>
              <DarkField label={txType === 'personal' ? '誰消費' : '誰付款'}>
                <div className="flex gap-2 overflow-x-auto pb-1">
                  {members.map(m => {
                    const selected = paidBy === m.id;
                    return (
                      <button key={m.id} onClick={() => setPaidBy(m.id)} className={`flex-shrink-0 flex flex-col items-center gap-1 p-2 rounded-xl min-w-[60px] ${selected ? 'ring-2' : 'bg-zinc-800'}`} style={selected ? { backgroundColor: (m.color || '#FF8C00') + '33', '--tw-ring-color': m.color || '#FF8C00' } : {}}>
                        <MemberAvatar member={m} size={36} />
                        <span className="text-[10px] truncate max-w-[56px]" style={{ color: selected ? ensureReadableColor(m.color) : '#fff' }}>{m.name}</span>
                      </button>
                    );
                  })}
                </div>
              </DarkField>

              {txType === 'shared' && (
                <>
                  <DarkField label="分帳方式">
                    <div className="bg-zinc-800 rounded-xl p-1 flex">
                      <button onClick={() => setSplitMode('even')} className={`flex-1 py-2 rounded-lg text-sm ${splitMode === 'even' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-400'}`}>平均分</button>
                      <button onClick={() => setSplitMode('manual')} className={`flex-1 py-2 rounded-lg text-sm ${splitMode === 'manual' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-400'}`}>手動輸入</button>
                    </div>
                  </DarkField>

                  <DarkField label={`由誰分擔（${splitAmong.length} 人）`}>
                    <div className="grid grid-cols-3 gap-2">
                      <button onClick={() => setSplitAmong(members.map(m => m.id))} className="py-2 text-xs bg-zinc-800 text-zinc-300 rounded-lg">全部</button>
                      <button onClick={() => setSplitAmong([paidBy])} className="py-2 text-xs bg-zinc-800 text-zinc-300 rounded-lg">只付款人</button>
                      <button onClick={() => setSplitAmong(members.filter(m => m.id !== paidBy).map(m => m.id))} className="py-2 text-xs bg-zinc-800 text-zinc-300 rounded-lg">其他人</button>
                    </div>
                    <div className="space-y-2 mt-2">
                      {members.map(m => {
                        const active = splitAmong.includes(m.id);
                        const evenShare = active && amt > 0 ? amt / splitAmong.length : 0;
                        const isFixed = active && fixedIds.includes(m.id);
                        const showShare = active && amt > 0;
                        return (
                          <div key={m.id} className={`rounded-xl ${active ? 'bg-orange-500/10 border border-orange-500/50' : 'bg-zinc-800 border border-transparent'}`}>
                            <button onClick={() => toggleSplit(m.id)} className="w-full flex items-center gap-3 p-2.5 text-left">
                              <MemberAvatar member={m} size={32} />
                              <span className="flex-1 text-sm" style={{ color: ensureReadableColor(m.color) }}>{m.name}</span>
                              {showShare && splitMode === 'even' && <span className="text-xs text-orange-400">{formatMoney(evenShare, settings.fromCurrency)}</span>}
                              {showShare && splitMode === 'manual' && (
                                <span className={`text-xs ${isFixed ? 'text-orange-400 font-medium' : 'text-zinc-500'}`}>
                                  {formatMoney(computedShare(m.id), settings.fromCurrency)}
                                  {!isFixed && <span className="ml-1 text-[9px]">平均</span>}
                                </span>
                              )}
                              <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${active ? 'bg-orange-500 border-orange-500' : 'border-zinc-600'}`}>{active && <IconCheck className="w-3 h-3 text-white" />}</div>
                            </button>
                            {active && splitMode === 'manual' && (
                              <div className="px-2.5 pb-2.5">
                                <div className="relative">
                                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 text-sm">{getCurrencySymbol(settings.fromCurrency)}</span>
                                  <input type="number" inputMode="decimal" value={splitAmounts[m.id] || ''}
                                    onChange={e => setSplitAmounts(s => ({ ...s, [m.id]: e.target.value }))}
                                    placeholder={freeIds.includes(m.id) ? `空白 = 平均分 ${formatMoney(freeShare, settings.fromCurrency)}` : '0'}
                                    className="w-full pl-9 pr-3 py-2 bg-zinc-900 text-white rounded-lg outline-none focus:ring-1 ring-orange-500 text-sm placeholder-zinc-600" />
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                    {splitMode === 'manual' && amt > 0 && (
                      <div className={`mt-2 p-2 rounded-lg text-xs space-y-0.5 ${manualOverBudget || manualAllFixed ? 'bg-red-500/10 text-red-400' : 'bg-green-500/10 text-green-400'}`}>
                        <div className="flex justify-between">
                          <span>固定 {fixedIds.length} 人</span>
                          <span>{formatMoney(fixedSum, settings.fromCurrency)}</span>
                        </div>
                        <div className="flex justify-between">
                          <span>平均分 {freeIds.length} 人</span>
                          <span>{freeIds.length > 0 ? `每人 ${formatMoney(freeShare, settings.fromCurrency)}` : '—'}</span>
                        </div>
                        {manualOverBudget && <div className="pt-1">⚠️ 固定金額超過總額</div>}
                        {manualAllFixed && <div className="pt-1">⚠️ 全部人固定但加總 ≠ 總額</div>}
                        {!manualOverBudget && !manualAllFixed && <div className="pt-1">✓ 總計 {formatMoney(amt, settings.fromCurrency)}</div>}
                      </div>
                    )}
                  </DarkField>
                </>
              )}
            </>
          )}

          <DarkField label="地點（選填）"><input value={location} onChange={e => setLocation(e.target.value)} placeholder="例如：Lawson" className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500 placeholder-zinc-500" /></DarkField>
          <DarkField label="備註（選填）">
            <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="任何備註…" rows={2} className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500 placeholder-zinc-500 resize-none" />
          </DarkField>
          <DarkField label="日期時間"><input type="datetime-local" value={datetime} onChange={e => setDatetime(e.target.value)} className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500" style={{ colorScheme: 'dark' }} /></DarkField>

          {expense && addComment && (
            <DarkField label={`留言（${comments.length}）`}>
              {comments.length === 0 ? (
                <div className="text-xs text-zinc-500 py-2 text-center bg-zinc-800/50 rounded-lg">仲未有留言</div>
              ) : (
                <div className="space-y-2 mb-2">
                  {comments.map(c => {
                    const author = members.find(m => m.id === c.authorId);
                    const canDelete = c.authorId === me?.id || isAdmin;
                    const d = new Date(c.createdAt || 0);
                    const ts = `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                    return (
                      <div key={c.id} className="bg-zinc-800 rounded-xl p-2.5">
                        <div className="flex items-start gap-2">
                          <MemberAvatar member={author} size={24} />
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-1.5">
                              <span className="text-xs font-medium" style={{ color: ensureReadableColor(author?.color) }}>{author?.name || '(已離開)'}</span>
                              <span className="text-[10px] text-zinc-500">{ts}</span>
                            </div>
                            <div className="text-sm text-white mt-0.5 whitespace-pre-wrap break-words">{c.text}</div>
                          </div>
                          {canDelete && (
                            <button onClick={() => { if (confirm('刪除呢個留言？')) deleteComment(expense.id, c.id); }} className="text-zinc-500 p-1">
                              <IconX className="w-3 h-3" />
                            </button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <div className="flex gap-2">
                <input value={newComment} onChange={e => setNewComment(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (newComment.trim()) { addComment(expense.id, newComment); setNewComment(''); } } }} placeholder="加個留言…" className="flex-1 px-3 py-2 bg-zinc-800 text-white rounded-lg outline-none focus:ring-2 ring-orange-500 placeholder-zinc-500 text-sm" />
                <button onClick={() => { if (newComment.trim()) { addComment(expense.id, newComment); setNewComment(''); } }} disabled={!newComment.trim()} className="px-4 py-2 bg-orange-500 text-white rounded-lg text-sm font-medium disabled:opacity-40">發送</button>
              </div>
            </DarkField>
          )}

          <div className="flex gap-2 pt-2">
            {onDelete && <button onClick={onDelete} className="px-5 py-4 bg-red-500/10 text-red-400 rounded-2xl"><IconTrash className="w-5 h-5" /></button>}
            <button onClick={handleSave} className="flex-1 py-4 bg-gradient-to-br from-orange-400 to-orange-600 text-white font-bold rounded-2xl shadow-lg shadow-orange-500/20">{expense ? '儲存修改' : '新增'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ========== ScanTab ==========
function ScanTab({ addMultipleExpenses, members, settings, onDone, isEditor }) {
  const [image, setImage] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
  const [showApiKey, setShowApiKey] = useState(false);
  const fileRef = useRef(null);

  if (!isEditor) {
    return (
      <div className="px-5 safe-top pt-4 pb-4">
        <h1 className="text-3xl font-bold text-white mb-3">掃描收據</h1>
        <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-8 text-center">
          <div className="text-4xl mb-2">🔒</div>
          <div className="text-zinc-500 text-sm">你係 Viewer，唔可以新增消費</div>
        </div>
      </div>
    );
  }

  const handleFile = (file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => { setImage(r.result); setResult(null); setError(''); };
    r.readAsDataURL(file);
  };

  const analyzeReceipt = async () => {
    if (!image) return;
    if (!apiKey) { setShowApiKey(true); return; }
    setLoading(true); setError('');
    try {
      const base64 = image.split(',')[1];
      const mediaType = image.match(/data:(.*?);/)[1];
      const prompt = "你係收據辨識助手。分析呢張收據，只輸出 JSON（唔好有 markdown 代碼標記）：\n\n{\n  \"store\": \"商店名稱（繁體中文，日文店名可以保留）\",\n  \"date\": \"YYYY-MM-DD（睇唔到就用今日）\",\n  \"items\": [\n    { \"name\": \"商品名（繁中）\", \"price\": 單價數字, \"qty\": 數量, \"category\": \"food|transport|shopping|accommodation|ticket|medicine|other\" }\n  ]\n}\n\n重要：\n- 如果一樣嘢買咗多件，qty 就係件數，price 係單價\n- 只提取明細嘅商品，唔好包含「小計」「合計」「稅」\n- 類別：food=餐飲, transport=交通, shopping=購物, accommodation=酒店, ticket=門票, medicine=藥品, other=其他";

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: mediaType, data: base64 } },
              { text: prompt }
            ]
          }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 2000 }
        })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || '辨識失敗');
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      const expanded = [];
      parsed.items.forEach(it => {
        const qty = it.qty || 1;
        for (let i = 0; i < qty; i++) {
          expanded.push({
            ...it, qty: 1, _id: Math.random().toString(36).slice(2),
            paidBy: members[0]?.id || '',
            splitAmong: members.map(m => m.id),
            _originalQty: qty, _itemIdx: i + 1,
          });
        }
      });
      setResult({ store: parsed.store, date: parsed.date, items: expanded });
    } catch (e) {
      setError('辨識失敗：' + e.message);
    }
    setLoading(false);
  };

  const updateItem = (id, patch) => setResult(r => ({ ...r, items: r.items.map(it => it._id === id ? { ...it, ...patch } : it) }));
  const deleteItem = (id) => setResult(r => ({ ...r, items: r.items.filter(it => it._id !== id) }));

  const confirmSave = () => {
    if (!result || !result.items.length) return;
    const newExpenses = result.items.map((item) => ({
      name: item.name, amount: item.price, category: item.category || 'other',
      paymentMethod: 'cash', paidBy: item.paidBy, splitAmong: item.splitAmong,
      location: result.store, date: result.date || new Date().toISOString().split('T')[0],
    }));
    addMultipleExpenses(newExpenses);
    setImage(null); setResult(null); onDone();
  };

  const totalResult = result?.items.reduce((s, i) => s + i.price, 0) || 0;

  return (
    <div className="px-5 safe-top pt-4 pb-4 space-y-4">
      <div>
        <h1 className="text-3xl font-bold text-white">掃描收據</h1>
        <p className="text-xs text-zinc-500 mt-1">AI 拆分每件商品，分別指派俾唔同嘅人</p>
      </div>

      {showApiKey && (
        <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-5" onClick={() => setShowApiKey(false)}>
          <div className="bg-zinc-900 rounded-2xl p-5 w-full max-w-sm" onClick={e => e.stopPropagation()}>
            <h3 className="text-white font-bold mb-2">設定 Gemini API Key</h3>
            <p className="text-xs text-zinc-500 mb-3">OCR 需要 Google Gemini 嘅免費 API key。去 <span className="text-orange-400">aistudio.google.com/apikey</span> 取得（免費）。Key 只會存喺你手機，唔會上傳任何地方。</p>
            <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="AIza..." className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none text-sm" />
            <button onClick={() => { localStorage.setItem('gemini_api_key', apiKey); setShowApiKey(false); }} className="w-full mt-3 py-3 bg-orange-500 text-white rounded-xl font-medium">儲存</button>
          </div>
        </div>
      )}

      <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-4">
        {!image ? (
          <>
            <button onClick={() => fileRef.current?.click()} className="w-full py-12 border-2 border-dashed border-zinc-800 rounded-2xl flex flex-col items-center gap-2 text-zinc-500">
              <IconUpload className="w-8 h-8" /><span className="text-sm">點擊拍照或上傳</span>
            </button>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={e => handleFile(e.target.files?.[0])} className="hidden" />
            {!apiKey && <button onClick={() => setShowApiKey(true)} className="w-full mt-2 text-xs text-orange-500 py-2">⚠️ 未設定 API key，點擊設定</button>}
          </>
        ) : (
          <div className="space-y-3">
            <img src={image} alt="receipt" className="w-full rounded-xl max-h-72 object-contain bg-black" />
            {!loading && !result && (
              <div className="flex gap-2">
                <button onClick={() => { setImage(null); setResult(null); }} className="flex-1 py-3 bg-zinc-800 text-zinc-300 rounded-xl font-medium">重新選</button>
                <button onClick={analyzeReceipt} className="flex-1 py-3 bg-gradient-to-br from-orange-400 to-orange-600 text-white rounded-xl font-medium">AI 辨識</button>
              </div>
            )}
            {loading && <div className="py-4 flex items-center justify-center gap-2 text-orange-500"><IconLoader className="w-5 h-5 animate-spin" /><span>正在辨識...</span></div>}
            {error && <div className="p-3 bg-red-500/10 text-red-400 text-sm rounded-xl">{error}</div>}
          </div>
        )}
      </div>

      {result && (
        <>
          <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-4">
            <div className="flex justify-between items-center mb-3">
              <div><div className="text-white font-bold">{result.store}</div><div className="text-xs text-zinc-500">{result.date}</div></div>
              <div className="text-right"><div className="text-xs text-zinc-500">總計</div><div className="text-white font-bold text-xl">{formatMoney(totalResult, settings.fromCurrency)}</div></div>
            </div>
            <div className="text-xs text-orange-400 bg-orange-500/10 border border-orange-500/30 rounded-xl p-3">💡 每件商品都可以分別指派「誰付款」同「誰分擔」。</div>
          </div>
          <div className="space-y-2">
            {result.items.map((item) => <ScanItemCard key={item._id} item={item} members={members} settings={settings} onUpdate={(patch) => updateItem(item._id, patch)} onDelete={() => deleteItem(item._id)} />)}
          </div>
          <button onClick={confirmSave} className="w-full py-4 bg-gradient-to-br from-orange-400 to-orange-600 text-white font-bold rounded-2xl shadow-lg shadow-orange-500/20">確認儲存（{result.items.length} 筆）</button>
        </>
      )}
    </div>
  );
}

function ScanItemCard({ item, members, settings, onUpdate, onDelete }) {
  const [expanded, setExpanded] = useState(false);
  const cat = CATEGORIES.find(c => c.id === item.category);
  const paidBy = members.find(m => m.id === item.paidBy);
  const splitCount = item.splitAmong?.length || 0;
  const isShared = splitCount === members.length;
  const isPersonal = splitCount === 1;

  return (
    <div className="bg-zinc-950 border border-zinc-900 rounded-2xl overflow-hidden">
      <button onClick={() => setExpanded(!expanded)} className="w-full p-3 flex items-center gap-3 text-left">
        <div className="w-9 h-9 rounded-lg flex items-center justify-center text-base flex-shrink-0" style={{ backgroundColor: cat?.color + '20' }}>{cat?.emoji}</div>
        <div className="flex-1 min-w-0">
          <div className="text-white text-sm truncate">{item.name}{item._originalQty > 1 && <span className="text-zinc-500 text-xs ml-1">({item._itemIdx}/{item._originalQty})</span>}</div>
          <div className="flex items-center gap-1.5 mt-0.5">
            {paidBy ? <><MemberAvatar member={paidBy} size={14} /><span className="text-[10px] text-zinc-500">{paidBy.name}</span></> : <span className="text-[10px] text-zinc-600">未指派</span>}
            <span className="text-[10px] text-zinc-600">·</span>
            <span className="text-[10px] text-zinc-500">{isShared ? '共同分擔' : isPersonal ? '個人' : `${splitCount} 人分擔`}</span>
          </div>
        </div>
        <div className="text-white font-bold">{formatMoney(item.price, settings.fromCurrency)}</div>
      </button>
      {expanded && (
        <div className="px-3 pb-3 space-y-3 border-t border-zinc-900 pt-3">
          <div>
            <div className="text-[10px] text-zinc-500 uppercase tracking-wider mb-1.5">誰付款</div>
            <div className="flex gap-1.5 overflow-x-auto pb-1">
              {members.map(m => (
                <button key={m.id} onClick={() => onUpdate({ paidBy: m.id })} className={`flex-shrink-0 flex flex-col items-center gap-1 p-1.5 rounded-lg min-w-[50px] ${item.paidBy === m.id ? 'bg-orange-500/20 ring-1 ring-orange-500' : 'bg-zinc-900'}`}>
                  <MemberAvatar member={m} size={28} /><span className="text-[9px] text-white truncate max-w-[46px]">{m.name}</span>
                </button>
              ))}
            </div>
          </div>
          <div>
            <div className="flex justify-between items-center mb-1.5">
              <span className="text-[10px] text-zinc-500 uppercase tracking-wider">誰分擔</span>
              <div className="flex gap-1">
                <button onClick={() => onUpdate({ splitAmong: members.map(m => m.id) })} className="text-[10px] text-orange-400 px-2 py-0.5 rounded bg-orange-500/10">全部</button>
                <button onClick={() => onUpdate({ splitAmong: item.paidBy ? [item.paidBy] : [] })} className="text-[10px] text-orange-400 px-2 py-0.5 rounded bg-orange-500/10">只付款人</button>
              </div>
            </div>
            <div className="flex flex-wrap gap-1.5">
              {members.map(m => {
                const active = item.splitAmong?.includes(m.id);
                return (
                  <button key={m.id} onClick={() => {
                    const next = active ? item.splitAmong.filter(x => x !== m.id) : [...(item.splitAmong || []), m.id];
                    onUpdate({ splitAmong: next });
                  }} className={`flex items-center gap-1.5 px-2 py-1.5 rounded-lg text-xs ${active ? 'bg-orange-500/20 text-orange-300 ring-1 ring-orange-500/50' : 'bg-zinc-900 text-zinc-500'}`}>
                    <MemberAvatar member={m} size={18} /><span>{m.name}</span>
                  </button>
                );
              })}

function DonutChart({ data, total, settings }) {
  if (data.length === 0 || total === 0) return <div className="text-center py-6 text-zinc-500 text-sm">暫無數據</div>;
  const size = 160, sw = 24, r = (size - sw) / 2, c = 2 * Math.PI * r, cx = size / 2;
  let acc = 0;
  const segs = data.map(d => {
    const pct = d.value / total, len = c * pct, off = c * (acc / total); acc += d.value;
    return { ...d, len, off, pct };
  });
  return (
    <div className="flex items-center gap-4">
      <div className="relative flex-shrink-0">
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {segs.map((s, i) => (<circle key={i} cx={cx} cy={cx} r={r} fill="none" stroke={s.color} strokeWidth={sw} strokeDasharray={`${s.len} ${c}`} strokeDashoffset={-s.off} transform={`rotate(-90 ${cx} ${cx})`} />))}
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <div className="text-[10px] text-zinc-500">TOTAL</div>
          <div className="text-white text-sm font-bold">{formatMoney(total, settings.fromCurrency, true)}</div>
        </div>
      </div>
      <div className="flex-1 space-y-1">
        {segs.map((s, i) => (
          <div key={i} className="flex items-center gap-2 text-xs">
            <div className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: s.color }} />
            <span className="text-zinc-300 flex-1">{s.label}</span>
            <span className="text-zinc-500 text-[10px]">{(s.pct * 100).toFixed(0)}%</span>
            <span className="text-white font-medium w-14 text-right">{formatMoney(s.value, settings.fromCurrency, true)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function MemberEditor({ member, usedColors = [], onClose, onSave }) {
  const [name, setName] = useState(member?.name || '');
  const [avatar, setAvatar] = useState(member?.avatar || '');
  const [color, setColor] = useState(member?.color || PRESET_COLORS[0]);
  const fileRef = useRef(null);
  const usedSet = new Set(usedColors);

  const handleAvatar = (file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 240;
        const size = Math.min(img.width, img.height);
        const sx = (img.width - size) / 2;
        const sy = (img.height - size) / 2;
        canvas.width = max; canvas.height = max;
        canvas.getContext('2d').drawImage(img, sx, sy, size, size, 0, 0, max, max);
        setAvatar(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = r.result;
    };
    r.readAsDataURL(file);
  };

  const handleSave = () => {
    if (!name.trim()) { alert('請輸入名字'); return; }
    onSave({ name: name.trim(), avatar, color });
  };

  return (
    <div className="fixed inset-0 bg-black/80 z-50 flex items-end backdrop-blur-sm" onClick={onClose}>
      <div className="bg-zinc-900 w-full rounded-t-3xl p-5 max-h-[92vh] overflow-y-auto border-t border-zinc-800 safe-bottom" onClick={e => e.stopPropagation()}>

          <button onClick={onClose} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center"><IconX className="w-4 h-4 text-zinc-400" /></button>
        </div>
        <div className="space-y-4">
          <div className="flex justify-center">
            <button onClick={() => fileRef.current?.click()} className="relative">
              {avatar ? (
                <img src={avatar} className="w-24 h-24 rounded-full object-cover ring-4 ring-zinc-800" alt="" />
              ) : (
                <div className="w-24 h-24 rounded-full flex items-center justify-center text-4xl font-bold text-white ring-4 ring-zinc-800" style={{ backgroundColor: color }}>{name[0] || '?'}</div>
              )}
              <div className="absolute bottom-0 right-0 w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center shadow-lg"><IconCamera className="w-4 h-4 text-white" /></div>
            </button>
            <input ref={fileRef} type="file" accept="image/*" onChange={e => handleAvatar(e.target.files?.[0])} className="hidden" />
          </div>
          <p className="text-center text-[10px] text-zinc-500">點擊更換頭像</p>
          <DarkField label="名字"><input value={name} onChange={e => setName(e.target.value)} placeholder="例如：Ricky" className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500" /></DarkField>
          <DarkField label="顏色（用喺名字、活動記錄）">
            <div className="flex gap-2 flex-wrap">
              {PRESET_COLORS.map(c => {
                const used = usedSet.has(c);
                return (
                  <button key={c} onClick={() => setColor(c)} className={`relative w-10 h-10 rounded-full transition ${color === c ? 'ring-2 ring-white scale-110' : ''} ${used && color !== c ? 'opacity-40' : ''}`} style={{ backgroundColor: c }}>
                    {used && color !== c && <span className="absolute -top-1 -right-1 text-[8px] bg-zinc-800 text-zinc-400 rounded-full px-1">已用</span>}
                  </button>
                );
              })}
              {/* color picker */}
              <label className="relative w-10 h-10 rounded-full border-2 border-dashed border-zinc-600 flex items-center justify-center cursor-pointer overflow-hidden">
                <input type="color" value={color} onChange={e => setColor(e.target.value)} className="absolute inset-0 opacity-0 cursor-pointer" />
                <span className="text-zinc-500 text-xs">+</span>
              </label>
            </div>
            <div className="text-[10px] text-zinc-500 mt-1">當前：<span style={{ color: ensureReadableColor(color) }}>{name || '名字預覽'}</span></div>
          </DarkField>
          {avatar && <button onClick={() => setAvatar('')} className="w-full py-2 text-sm text-zinc-400 bg-zinc-800 rounded-xl">移除頭像</button>}
          <button onClick={handleSave} className="w-full py-4 bg-gradient-to-br from-orange-400 to-orange-600 text-white font-bold rounded-2xl shadow-lg shadow-orange-500/20">儲存</button>
        </div>
      </div>
    </div>
  );
}

// ========== Error Boundary ==========
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, info: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    this.setState({ error, info });
    console.error('ErrorBoundary caught:', error, info);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ padding: '60px 20px 40px', background: '#000', color: '#fff', fontFamily: 'monospace', fontSize: 12, minHeight: '100vh', whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
          <div style={{ color: '#FF8C00', fontSize: 14, fontWeight: 'bold', marginBottom: 12 }}>⚠️ 渲染錯誤</div>
          <div style={{ marginBottom: 12 }}>{String(this.state.error?.message || this.state.error)}</div>
          <div style={{ color: '#888', fontSize: 10, marginBottom: 12 }}>{this.state.error?.stack || ''}</div>
          <div style={{ color: '#888', fontSize: 10, marginBottom: 12 }}>{this.state.info?.componentStack || ''}</div>
          <button onClick={() => { window.location.hash = '#/'; window.location.reload(); }} style={{ marginTop: 12, padding: '8px 16px', background: '#FF8C00', color: '#fff', border: 'none', borderRadius: 8 }}>返旅程列表 + 重載</button>
          <button onClick={() => { Object.keys(localStorage).filter(k => k.startsWith('identity:')).forEach(k => localStorage.removeItem(k)); window.location.hash = '#/'; window.location.reload(); }} style={{ marginTop: 12, marginLeft: 8, padding: '8px 16px', background: '#333', color: '#fff', border: 'none', borderRadius: 8 }}>清除身分 + 重載</button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ========== 啟動 ==========
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
